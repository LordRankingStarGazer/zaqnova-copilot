const POPUP_SCRIPT = `
var entries=[];
window.addEventListener('message',function(e){
  var d=e.data;
  if(!d||!d.t) return;
  if(d.t==='add'){entries.push(d.entry);render();}
  else if(d.t==='upd'){var i=entries.findIndex(function(x){return x.id===d.id});if(i>=0){entries[i]=Object.assign({},entries[i],d.patch);render();}}
  else if(d.t==='clr'){entries=[];render();}
  else if(d.t==='hide'){document.body.style.opacity='0';document.body.style.pointerEvents='none';}
  else if(d.t==='show'){document.body.style.opacity='1';document.body.style.pointerEvents='';}
});
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function render(){
  var r=document.getElementById('root');
  if(!entries.length){
    r.innerHTML='<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Waiting for questions...</span><span style="font-size:11px;color:#1e293b">Auto-detect is active</span></div>';
    return;
  }
  r.innerHTML=entries.map(function(en){
    if(en.loading){return '<div class="proc"><div class="spin"></div><span style="font-size:12px;color:#475569">Generating answer...</span></div>';}
    var sa=en.streaming?' streaming':'';
    return '<div class="card" id="c'+en.id+'"><div class="qlbl">Question</div><div class="qtxt">'+esc(en.q)+'</div><div class="albl">Answer</div><div class="atxt'+sa+'">'+esc(en.a||'')+'</div>'+(en.streaming?'':'<button class="cbtn" onclick="cp(this,\''+en.id+'\')">Copy answer</button>')+'</div>';
  }).join('');
  r.scrollTop=r.scrollHeight;
}
function cp(btn,id){
  var en=entries.find(function(x){return x.id===id});
  if(!en)return;
  navigator.clipboard.writeText(en.a||'').then(function(){
    btn.textContent='Copied!';btn.classList.add('ok');
    setTimeout(function(){btn.textContent='Copy answer';btn.classList.remove('ok');},2000);
  });
}
render();
`;

const POPUP_HTML = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Notes</title><style>${POPUP_STYLES}</style></head><body>

// ─── HELPERS ─────────────────────────────────────────────────────────────────────
let idCounter = 0;
const uid = () => `${Date.now()}-${++idCounter}`;

const QUESTION_STARTERS = [
  'what','how','why','when','where','who','which','whose','whom',
  'can you','could you','would you','will you','do you','did you',
  'have you','are you','tell me','describe','explain','walk me through',
  'share','give me','talk about','let\'s say','imagine','suppose',
  'if you','what if','in your','why did','why do','how did','how do',
  'can you describe','could you describe','have you ever',
  'what was','what were','what is','what are','what would',
  'how would','how have','where do','where did','why would',
  'who was','who is','what experience','what skills','tell us',
  'give us','can you give','can you share','can you walk',
];

function isQuestion(text) {
  if (!text || text.trim().length < 8) return false;
  const t = text.trim();
  if (t.endsWith('?')) return true;
  const l = t.toLowerCase();
  return QUESTION_STARTERS.some(s => l.startsWith(s));
}

function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function extractPdfText(file) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 12); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  return text.trim();
}

async function extractDocxText(file) {
  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: buf });
  return result.value.trim();
}

async function extractFileText(file) {
  const name = file.name.toLowerCase();
  if (file.type === 'application/pdf' || name.endsWith('.pdf')) return extractPdfText(file);
  if (name.endsWith('.docx') || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') return extractDocxText(file);
  if (name.endsWith('.doc')) throw new Error('.doc (old Word) format not supported — please save as .docx or .pdf');
  return file.text();
}

async function callAnthropic(apiKey, model, messages, system, onChunk) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-allow-browser': 'true',
    },
    body: JSON.stringify({ model, max_tokens: 600, stream: true, system, messages })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${res.status}`);
  }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  let full = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const parsed = JSON.parse(data);
        if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
          full += parsed.delta.text;
          onChunk && onChunk(full);
        }
      } catch (_) {}
    }
  }
  return full;
}

function buildSystemPrompt(cfg) {
  const parts = [
    `You are a personal interview coach helping a candidate answer questions live during a job interview. Be concise, confident, and direct. Sound completely natural — like a real person speaking, not a formal essay or AI.`,
    `Keep answers to 3-5 sentences. Lead with the most impressive point. Never ramble.`,
    `Job role being interviewed for: ${cfg.jobTitle || 'Not specified'}.`,
  ];
  if (cfg.resumeText) parts.push(`\nCandidate's resume / background:\n${cfg.resumeText.slice(0, 4500)}`);
  if (cfg.contextDoc) parts.push(`\nAdditional context document:\n${cfg.contextDoc.slice(0, 2500)}`);
  if (cfg.context) parts.push(`\nExtra instructions from the candidate:\n${cfg.context}`);
  parts.push(`\nIMPORTANT: Never say you are an AI. Always answer in first person as the candidate. Be specific, use real-sounding examples from the resume where possible.`);
  return parts.join('\n');
}

// ─── COST ESTIMATE ───────────────────────────────────────────────────────────────
const COST_ESTIMATES = [
  { model: 'claude-sonnet-4-20250514', label: 'Sonnet 4', range: '~$0.10–$0.25', note: 'Recommended — great balance' },
  { model: 'claude-haiku-4-5-20251001', label: 'Haiku 4.5', range: '~$0.02–$0.06', note: 'Fastest, lowest cost' },
  { model: 'claude-opus-4-5', label: 'Opus 4.5', range: '~$0.50–$1.20', note: 'Most capable, highest cost' },

// ─── SETUP SCREEN ────────────────────────────────────────────────────────────────

function SetupScreen({ onStart }) {

  const [rememberKey, setRememberKey] = useState(() => !!localStorage.getItem(LS_KEY));
  const [jobTitle, setJobTitle] = useState('');
  const [context, setContext] = useState('');
  const [resumeText, setResumeText] = useState('');
  const [resumeName, setResumeName] = useState('');
  const [contextDoc, setContextDoc] = useState('');
  const [contextDocName, setContextDocName] = useState('');
  const [model, setModel] = useState('claude-sonnet-4-20250514');
  const [resumeLoading, setResumeLoading] = useState(false);
  const [docLoading, setDocLoading] = useState(false);
  const [error, setError] = useState('');
  const [showCost, setShowCost] = useState(false);

  const docsRef = useRef();

  const handleRememberToggle = (checked) => {
    setRememberKey(checked);
    if (checked && apiKey.trim()) localStorage.setItem(LS_KEY, apiKey.trim());
    else localStorage.removeItem(LS_KEY);
  };

  const handleApiKeyChange = (val) => {
    setApiKey(val);
    if (rememberKey) {
      if (val.trim()) localStorage.setItem(LS_KEY, val.trim());
      else localStorage.removeItem(LS_KEY);
    }
  };

  const handleResume = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setResumeName(file.name);
    setResumeLoading(true);
    setError('');
    try {
      const text = await extractFileText(file);
      setResumeText(text);
    } catch (err) {
      setError('Resume: ' + err.message);
      setResumeName('');
    }
    setResumeLoading(false);
    e.target.value = '';
  };

  const handleContextDoc = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setContextDocName(file.name);
    setDocLoading(true);
    setError('');
    try {
      const text = await extractFileText(file);
      setContextDoc(text);
    } catch (err) {
      setError('Context doc: ' + err.message);
      setContextDocName('');
    }
    setDocLoading(false);
    e.target.value = '';
  };

  const handleStart = () => {

    if (!jobTitle.trim()) { setError('Please enter the job title.'); return; }
    setError('');
    onStart({ apiKey: apiKey.trim(), jobTitle: jobTitle.trim(), context, resumeText, contextDoc, model });
  };

  const selectedCost = COST_ESTIMATES.find(c => c.model === model);

  return (
    <div className="min-h-screen bg-[#080c14] flex items-center justify-center p-4">

              </svg>

            </div>

        </div>

        <div className="bg-[#0b1120] border border-[#0f172a] rounded-2xl p-6 space-y-5">
          {/* API Key */}

            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Anthropic API Key</label>
            <input

            <div>

            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">AI Model</label>
            <select
              value={model}

          <div>

            <textarea
              value={context}

            />

          {error && (
            <div className="flex items-start gap-2 bg-red-500/10 border border-red-500/30 rounded-lg px-3 py-2.5">
              <svg className="w-4 h-4 text-red-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126Z" />
              </svg>
              <span className="text-sm text-red-400">{error}</span>
            </div>
          )}

          <button
            onClick={handleStart}
            className="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold rounded-xl py-3 text-sm transition-colors flex items-center justify-center gap-2"
          >
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z" />
            </svg>
            Launch Session
          </button>
        </div>

        {/* Cost Estimate */}
        <div className="mt-4 bg-[#0b1120] border border-[#0f172a] rounded-xl overflow-hidden">
          <button
            onClick={() => setShowCost(v => !v)}
            className="w-full flex items-center justify-between px-4 py-3 text-left hover:bg-[#0f172a]/50 transition-colors"
          >
            <div className="flex items-center gap-2">
              <svg className="w-3.5 h-3.5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z" />
              </svg>
              <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">API Cost Estimate — 30 min session</span>
            </div>
            <div className="flex items-center gap-2">
              {selectedCost && <span className="text-xs text-blue-400 font-semibold">{selectedCost.range}</span>}
              <svg className={`w-3.5 h-3.5 text-slate-600 transition-transform ${showCost ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
              </svg>
            </div>
          </button>
          {showCost && (
            <div className="px-4 pb-4 space-y-2 border-t border-[#0f172a]">
              <p className="text-xs text-slate-600 pt-3 mb-3">Based on ~20 questions, 800-token system prompt, 200-token answers, plus notes generation.</p>
              {COST_ESTIMATES.map(c => (
                <div key={c.model} className={`flex items-center justify-between py-2 px-3 rounded-lg ${model === c.model ? 'bg-blue-500/10 border border-blue-500/20' : 'bg-[#080c14]'}`}>
                  <div>
                    <span className="text-xs text-slate-300 font-medium">{c.label}</span>
                    <span className="text-xs text-slate-600 ml-2">{c.note}</span>
                  </div>
                  <span className={`text-xs font-semibold ${model === c.model ? 'text-blue-400' : 'text-slate-400'}`}>{c.range}</span>
                </div>
              ))}
              <p className="text-xs text-slate-700 mt-2">Longer resumes, more questions, or longer answers increase cost proportionally. A 1-hour session roughly doubles these estimates.</p>
            </div>
          )}
        </div>

        <p className="text-center text-xs text-slate-700 mt-3">
          Answers display in a detached popup — not captured by Zoom, Teams, or Meet by default.
        </p>
      </div>
    </div>
  );
}

// ─── SESSION SCREEN ──────────────────────────────────────────────────────────────
function SessionScreen({ cfg, onEnd }) {
  const [entries, setEntries] = useState([]);
  const [transcript, setTranscript] = useState([]);
  const [isListening, setIsListening] = useState(false);
  const [isRecording, setIsRecording] = useState(false);
  const [micError, setMicError] = useState('');
  const [sessionTime, setSessionTime] = useState(0);
  const [manualInput, setManualInput] = useState('');
  const [popupOpen, setPopupOpen] = useState(false);
  const [popupBlocked, setPopupBlocked] = useState(false);
  const [popupHidden, setPopupHidden] = useState(false);
  const [statusMsg, setStatusMsg] = useState('');
  const [autoAnswer, setAutoAnswer] = useState(true);

  const popupRef = useRef(null);
  const recognitionRef = useRef(null);
  const mediaRecorderRef = useRef(null);
  const audioStreamRef = useRef(null);
  const audioChunksRef = useRef([]);
  const audioBlobRef = useRef(null);
  const timerRef = useRef(null);
  const debounceRef = useRef(null);
  const lastQuestionRef = useRef('');
  const transcriptEndRef = useRef(null);
  const entriesRef = useRef([]);
  const transcriptRef = useRef([]);

  useEffect(() => { entriesRef.current = entries; }, [entries]);
  useEffect(() => { transcriptRef.current = transcript; }, [transcript]);

  // Timer
  useEffect(() => {
    timerRef.current = setInterval(() => setSessionTime(t => t + 1), 1000);
    return () => clearInterval(timerRef.current);
  }, []);

  // Open popup on mount
  useEffect(() => {
    openPopup();
    return () => {
      if (popupRef.current && !popupRef.current.closed) popupRef.current.close();
    };
  }, []);

  // Keyboard shortcut Ctrl+Shift+H
  useEffect(() => {
    const handler = (e) => {
      if (e.ctrlKey && e.shiftKey && (e.key === 'H' || e.key === 'h')) {
        e.preventDefault();
        togglePopup();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [popupHidden]);

  // Watch popup close
  useEffect(() => {
    const check = setInterval(() => {
      if (popupRef.current && popupRef.current.closed) {
        setPopupOpen(false);
        popupRef.current = null;
      }
    }, 1200);
    return () => clearInterval(check);
  }, []);

  // Auto-scroll transcript
  useEffect(() => {
    transcriptEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [transcript]);

  function openPopup() {
    try {
      const sw = window.screen.width, sh = window.screen.height;
      const pw = 450, ph = Math.min(720, sh - 80);
      const pl = Math.max(0, sw - pw - 16), pt = Math.floor((sh - ph) / 2);
      const popup = window.open('', 'ZaqNovaAnswers',
        `width=${pw},height=${ph},left=${pl},top=${pt},menubar=no,toolbar=no,location=no,status=no,scrollbars=yes,resizable=yes`);
      if (!popup || popup.closed) { setPopupBlocked(true); return; }
      popup.document.open();
      popup.document.write(POPUP_HTML);
      popup.document.close();
      popupRef.current = popup;
      setPopupOpen(true);
      setPopupBlocked(false);
      setPopupHidden(false);
    } catch (_) { setPopupBlocked(true); }
  }

  function postToPopup(msg) {
    if (popupRef.current && !popupRef.current.closed) {
      try { popupRef.current.postMessage(msg, '*'); } catch (_) {}
    }
  }

  function togglePopup() {
    if (!popupRef.current || popupRef.current.closed) { openPopup(); return; }
    if (popupHidden) {
      postToPopup({ t: 'show' });
      setPopupHidden(false);
    } else {
      postToPopup({ t: 'hide' });
      setPopupHidden(true);
    }
  }

  function showStatus(msg, ms = 2500) {
    setStatusMsg(msg);
    setTimeout(() => setStatusMsg(''), ms);
  }

  // ── Recording ──
  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioStreamRef.current = stream;
      audioChunksRef.current = [];
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
      const mr = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      mr.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunksRef.current.push(e.data); };
      mr.start(1000);
      mediaRecorderRef.current = mr;
      setIsRecording(true);
    } catch (_) {
      // Recording permission denied or unavailable — continue without it
    }
  }

  function stopRecording() {
    return new Promise(resolve => {
      const mr = mediaRecorderRef.current;
      if (!mr) { resolve(null); return; }
      const chunks = audioChunksRef.current;
      const mimeType = mr.mimeType || 'audio/webm';
      mr.addEventListener('stop', () => {
        const blob = new Blob(chunks, { type: mimeType });
        audioBlobRef.current = blob;
        resolve(blob);
      }, { once: true });
      try { mr.stop(); } catch (_) { resolve(null); }
      mediaRecorderRef.current = null;
      if (audioStreamRef.current) {
        audioStreamRef.current.getTracks().forEach(t => t.stop());
        audioStreamRef.current = null;
      }
      setIsRecording(false);
    });
  }

  // ── AI Answer ──
  async function processQuestion(question) {
    if (!question.trim() || question.trim() === lastQuestionRef.current) return;
    lastQuestionRef.current = question.trim();

    const id = uid();
    const entry = { id, q: question.trim(), a: '', loading: true, streaming: false };
    setEntries(prev => [...prev, entry]);
    postToPopup({ t: 'add', entry: { ...entry } });

    try {
      const sys = buildSystemPrompt(cfg);
      let started = false;
      const finalAnswer = await callAnthropic(
        cfg.apiKey, cfg.model,
        [{ role: 'user', content: question }],
        sys,
        (partial) => {
          if (!started) {
            started = true;
            setEntries(prev => prev.map(e => e.id === id ? { ...e, loading: false, streaming: true, a: partial } : e));
            postToPopup({ t: 'upd', id, patch: { loading: false, streaming: true, a: partial } });
          } else {
            setEntries(prev => prev.map(e => e.id === id ? { ...e, a: partial } : e));
            postToPopup({ t: 'upd', id, patch: { a: partial } });
          }
        }
      );
      setEntries(prev => prev.map(e => e.id === id ? { ...e, loading: false, streaming: false, a: finalAnswer } : e));
      postToPopup({ t: 'upd', id, patch: { loading: false, streaming: false, a: finalAnswer } });
    } catch (err) {
      const msg = `Error: ${err.message}`;
      setEntries(prev => prev.map(e => e.id === id ? { ...e, loading: false, streaming: false, a: msg } : e));
      postToPopup({ t: 'upd', id, patch: { loading: false, streaming: false, a: msg } });
      showStatus('API error — check key & network');
    }
  }

  // ── Speech Recognition ──
  function startListening() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setMicError('Speech recognition not supported — use Chrome or Edge.'); return; }

    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'en-US';
    let finalBuffer = '';

    rec.onstart = () => { setIsListening(true); setMicError(''); };
    rec.onerror = (ev) => {
      if (ev.error === 'not-allowed') setMicError('Microphone denied — allow it in browser settings.');
      else if (ev.error !== 'no-speech') setMicError(`Mic error: ${ev.error}`);
    };
    rec.onend = () => {
      setIsListening(false);
      if (recognitionRef.current === rec) recognitionRef.current = null;
    };
    rec.onresult = (event) => {
      let newFinal = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) newFinal += event.results[i][0].transcript + ' ';
      }
      if (!newFinal) return;

      finalBuffer += newFinal;
      const trimmed = finalBuffer.trim();

      setTranscript(prev => {
        const last = prev[prev.length - 1];
        if (last && last.type === 'speech') return [...prev.slice(0, -1), { ...last, text: trimmed }];
        return [...prev, { id: uid(), type: 'speech', text: trimmed }];
      });

      clearTimeout(debounceRef.current);
      if (autoAnswer && isQuestion(trimmed)) {
        debounceRef.current = setTimeout(() => {
          const q = finalBuffer.trim();
          finalBuffer = '';
          setTranscript(prev => [...prev, { id: uid(), type: 'question', text: q }]);
          processQuestion(q);
        }, 1500);
      } else {
        debounceRef.current = setTimeout(() => { finalBuffer = ''; }, 5000);
      }
    };

    rec.start();
    recognitionRef.current = rec;
    // Start audio recording alongside speech recognition
    startRecording();
  }

  function stopListening() {
    clearTimeout(debounceRef.current);
    if (recognitionRef.current) {
      try { recognitionRef.current.stop(); } catch (_) {}
      recognitionRef.current = null;
    }
    setIsListening(false);
  }

  function toggleMic() {
    if (isListening) stopListening();
    else startListening();
  }

  function askManual() {
    const q = manualInput.trim();
    if (!q) return;
    setManualInput('');
    setTranscript(prev => [...prev, { id: uid(), type: 'question', text: q }]);
    processQuestion(q);
  }

  function copyAnswer(text) {
    navigator.clipboard.writeText(text).then(() => showStatus('Copied!'));
  }

  function downloadTranscript() {
    const lines = transcriptRef.current;
    if (!lines.length) { showStatus('No transcript yet'); return; }
    const date = new Date().toISOString().slice(0,10);
    const txt = `ZaqNova Interview CoPilot — Live Transcript\n${cfg.jobTitle} · ${formatTime(sessionTime)}\n${date}\n${'─'.repeat(50)}\n\n` +
      lines.map(t => `[${t.type === 'question' ? 'QUESTION' : 'SPEECH  '}]  ${t.text}`).join('\n\n');
    const blob = new Blob([txt], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `transcript-${date}.txt`; a.click();
    URL.revokeObjectURL(url);
  }

  async function handleEnd() {
    stopListening();
    clearInterval(timerRef.current);
    const audioBlob = await stopRecording();
    if (popupRef.current && !popupRef.current.closed) popupRef.current.close();
    onEnd({
      entries: entriesRef.current,
      transcript: transcriptRef.current,
      duration: sessionTime,
      audioBlob,
    });
  }

  return (
    <div className="h-screen bg-[#080c14] flex flex-col overflow-hidden">
      {/* Header */}
      <div className="flex items-center justify-between px-3 py-2 bg-[#0b1120] border-b border-[#0f172a] flex-shrink-0">
        <div className="flex items-center gap-2">
          {/* Mic button */}
          <button
            onClick={toggleMic}
            className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-semibold transition-all ${
              isListening
                ? 'bg-red-500/20 text-red-400 border border-red-500/40 pulse-ring'
                : 'bg-[#0f172a] text-slate-400 border border-[#1e293b] hover:border-slate-600'
            }`}
          >
            <div className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${isListening ? 'bg-red-400' : 'bg-slate-600'}`} />
            {isListening ? 'Listening' : 'Start Mic'}
          </button>

          {/* Recording indicator */}
          {isRecording && (
            <div className="flex items-center gap-1 px-2 py-1 rounded-md bg-amber-500/10 border border-amber-500/30 pulse-ring-amber">
              <div className="w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0" />
              <span className="text-xs text-amber-400 font-semibold">REC</span>
            </div>
          )}

          {/* Timer */}
          <span className="text-slate-500 text-xs font-mono tabular-nums">{formatTime(sessionTime)}</span>
        </div>

        <div className="flex items-center gap-1.5 flex-wrap justify-end">
          {statusMsg && (
            <span className="text-xs text-slate-400 bg-[#0f172a] px-2 py-1 rounded border border-[#1e293b]">{statusMsg}</span>
          )}

          {/* Download transcript (mid-session) */}
          <button
            onClick={downloadTranscript}
            title="Download transcript"
            className="flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs border border-[#1e293b] text-slate-500 hover:text-slate-300 hover:border-slate-600 transition-colors"
          >
            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            <span className="hidden sm:inline">Transcript</span>
          </button>

          {/* Popup toggle */}
          <button
            onClick={togglePopup}
            className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-colors ${
              popupOpen && !popupHidden
                ? 'text-green-400 border-green-500/40 bg-green-500/10'
                : 'text-slate-500 border-[#1e293b] hover:border-slate-600'
            }`}
          >
            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M3 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 0 1 0 1.954l-7.108 4.061A1.125 1.125 0 0 1 3 16.811V8.69ZM12.75 8.689c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 0 1 0 1.954l-7.108 4.061a1.125 1.125 0 0 1-1.683-.977V8.69Z" />
            </svg>
            {popupOpen && !popupHidden ? 'Answers ✓' : popupHidden ? 'Answers ·' : 'Open Answers'}
          </button>

          {/* End session */}
          <button
            onClick={handleEnd}
            className="px-2.5 py-1.5 rounded-lg text-xs font-medium text-slate-400 border border-[#1e293b] hover:border-red-500/50 hover:text-red-400 transition-colors"
          >
            End
          </button>
        </div>
      </div>

      {/* Popup blocked */}
      {popupBlocked && (
        <div className="mx-3 mt-2 flex items-start gap-2.5 bg-amber-500/10 border border-amber-500/30 rounded-xl p-2.5 flex-shrink-0">
          <svg className="w-4 h-4 text-amber-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126Z" />
          </svg>
          <div>
            <p className="text-xs text-amber-400 font-medium">Popup blocked — allow popups for this page in your browser, then click "Open Answers".</p>
            <button onClick={openPopup} className="mt-1.5 text-xs text-amber-400 border border-amber-500/40 px-2 py-0.5 rounded hover:bg-amber-500/10">Try Again</button>
          </div>
        </div>
      )}

      {/* Mic error */}
      {micError && (
        <div className="mx-3 mt-2 bg-red-500/10 border border-red-500/30 rounded-xl p-2.5 text-xs text-red-400 flex-shrink-0">{micError}</div>
      )}

      {/* Two-panel layout */}
      <div className="flex-1 flex flex-col md:flex-row overflow-hidden min-h-0">

        {/* LEFT: Live Transcript */}
        <div className="flex-1 flex flex-col overflow-hidden md:border-r border-[#0f172a] min-h-0">
          <div className="px-3 py-2 border-b border-[#0f172a] flex items-center justify-between flex-shrink-0">
            <span className="text-xs text-slate-600 font-semibold uppercase tracking-wider">Live Transcript</span>
            {/* Auto-answer toggle */}
            <div className="flex items-center gap-2">
              <span className="text-xs text-slate-600">Auto-answer</span>
              <button
                onClick={() => setAutoAnswer(v => !v)}
                className={`relative w-8 h-4 rounded-full transition-colors flex-shrink-0 ${autoAnswer ? 'bg-blue-600' : 'bg-slate-700'}`}
                title={autoAnswer ? 'Auto-answer ON' : 'Auto-answer OFF'}
              >
                <div className={`toggle-knob absolute top-0.5 w-3 h-3 rounded-full bg-white ${autoAnswer ? 'translate-x-4' : 'translate-x-0.5'}`} />
              </button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-3 space-y-1.5 min-h-0">
            {transcript.length === 0 && (
              <div className="flex flex-col items-center justify-center h-36 text-slate-700 gap-2">
                <svg className="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                </svg>
                <span className="text-xs text-center">Press "Start Mic" to begin transcribing</span>
              </div>
            )}
            {transcript.map(t => (
              <div key={t.id} className="fade-up flex items-start gap-2">
                <div className={`flex-shrink-0 w-1.5 h-1.5 rounded-full mt-1.5 ${t.type === 'question' ? 'bg-blue-400' : 'bg-slate-700'}`} />
                <p className={`text-xs leading-relaxed ${t.type === 'question' ? 'text-slate-200 font-medium' : 'text-slate-500'}`}>
                  {t.text}
                  {t.type === 'question' && (
                    <span className="ml-1.5 text-xs text-blue-400 bg-blue-400/10 px-1 py-0.5 rounded font-semibold">Q→AI</span>
                  )}
                </p>
              </div>
            ))}
            <div ref={transcriptEndRef} />
          </div>

          {/* Manual input */}
          <div className="p-2.5 border-t border-[#0f172a] flex gap-2 flex-shrink-0">
            <input
              type="text"
              value={manualInput}
              onChange={e => setManualInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askManual(); } }}
              placeholder="Type a question to get an AI answer…"
              className="flex-1 bg-[#0b1120] border border-[#1e293b] rounded-lg px-3 py-2 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-blue-500/50 transition-colors"
            />
            <button
              onClick={askManual}
              disabled={!manualInput.trim()}
              className="px-3 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-30 disabled:cursor-not-allowed text-white rounded-lg text-xs font-semibold transition-colors"
            >
              Ask
            </button>
          </div>
        </div>

        {/* RIGHT: Answers (inline fallback) */}
        <div className="flex-1 flex flex-col overflow-hidden md:max-w-sm lg:max-w-md min-h-0">
          <div className="px-3 py-2 border-b border-[#0f172a] flex items-center justify-between flex-shrink-0">
            <span className="text-xs text-slate-600 font-semibold uppercase tracking-wider">Answers</span>
            {popupOpen && !popupHidden
              ? <span className="text-xs text-green-400/50">→ Popup active</span>
              : <span className="text-xs text-slate-700">Popup hidden/closed</span>
            }
          </div>
          <div className="flex-1 overflow-y-auto p-3 space-y-3 min-h-0">
            {entries.length === 0 && (
              <div className="flex flex-col items-center justify-center h-36 text-slate-700 gap-2">
                <svg className="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
                </svg>
                <span className="text-xs">AI answers appear here</span>
              </div>
            )}
            {entries.map(entry => (
              <div key={entry.id} className="fade-up bg-[#0b1120] border border-[#0f172a] rounded-xl p-3">
                <p className="text-xs text-slate-600 font-semibold uppercase tracking-wider mb-1">Q</p>
                <p className="text-xs text-slate-500 mb-2 leading-relaxed">{entry.q}</p>
                <p className="text-xs text-blue-400 font-semibold uppercase tracking-wider mb-1">Answer</p>
                {entry.loading ? (
                  <div className="flex items-center gap-2 text-slate-600 text-xs py-1">
                    <div className="w-3 h-3 border border-slate-700 border-t-blue-500 rounded-full spinner" />
                    Generating…
                  </div>
                ) : (
                  <>
                    <p className={`text-xs text-slate-200 leading-relaxed whitespace-pre-wrap ${entry.streaming ? 'blink' : ''}`}>{entry.a}</p>
                    {!entry.streaming && entry.a && !entry.a.startsWith('Error:') && (
                      <button
                        onClick={() => copyAnswer(entry.a)}
                        className="mt-2 text-xs text-slate-600 border border-[#1e293b] px-2 py-0.5 rounded hover:text-white hover:border-slate-500 transition-colors"
                      >Copy</button>
                    )}
                  </>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── NOTES SCREEN ────────────────────────────────────────────────────────────────
function NotesScreen({ cfg, sessionData, onRestart }) {
  const [notes, setNotes] = useState('');
  const [generating, setGenerating] = useState(false);
  const [copied, setCopied] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => { generateNotes(); }, []);

  async function generateNotes() {
    if (!sessionData?.entries?.length) {
      setNotes('No questions were recorded in this session.');
      return;
    }
    setGenerating(true);
    try {
      const qaPairs = sessionData.entries
        .filter(e => e.a && !e.a.startsWith('Error:'))
        .map((e, i) => `Q${i+1}: ${e.q}\nA${i+1}: ${e.a}`)
        .join('\n\n');
      const dur = formatTime(sessionData.duration || 0);
      const prompt = `Here is a transcript of an interview session (${dur} long) for a "${cfg.jobTitle}" role:\n\n${qaPairs}\n\nPlease generate a structured post-session debrief with:\n1. **Session Overview** — role, duration, number of questions covered\n2. **Key Questions & Best Answers** — top 3–5, condensed to 1–2 sentences each\n3. **Topics & Themes Covered** — bullet list\n4. **Action Items** — what to research, prepare, or improve before next interview\n5. **Strengths Demonstrated** — specific examples from the session\n6. **Areas to Improve** — honest assessment\n\nBe specific and actionable.`;
      const text = await callAnthropic(
        cfg.apiKey, cfg.model,
        [{ role: 'user', content: prompt }],
        'You are an expert interview coach producing a post-session debrief. Be honest, specific, and actionable.',
        null
      );
      setNotes(text);
    } catch (err) {
      setError(`Notes generation failed: ${err.message}`);
      const fallback = sessionData.entries
        .filter(e => e.a)
        .map((e, i) => `Question ${i+1}:\n${e.q}\n\nAnswer:\n${e.a}`)
        .join('\n\n' + '─'.repeat(40) + '\n\n');
      setNotes(fallback || 'No answers recorded.');
    }
    setGenerating(false);
  }

  const date = new Date().toISOString().slice(0,10);

  function copyNotes() {
    navigator.clipboard.writeText(notes).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  }

  function downloadNotes() {
    const title = `ZaqNova Interview CoPilot — Session Notes`;
    const sub = `${cfg.jobTitle} · ${formatTime(sessionData?.duration || 0)} · ${date}`;
    const content = `${title}\n${sub}\n${'═'.repeat(Math.max(title.length, sub.length))}\n\n${notes}`;
    triggerDownload(content, 'text/plain', `interview-notes-${date}.txt`);
  }

  function downloadTranscript() {
    const lines = sessionData?.transcript || [];
    if (!lines.length) return;
    const txt = `ZaqNova Interview CoPilot — Transcript\n${cfg.jobTitle} · ${formatTime(sessionData?.duration || 0)} · ${date}\n${'─'.repeat(50)}\n\n` +
      lines.map(t => `[${t.type === 'question' ? 'QUESTION' : 'SPEECH  '}]  ${t.text}`).join('\n\n');
    triggerDownload(txt, 'text/plain', `interview-transcript-${date}.txt`);
  }

  function downloadRecording() {
    const blob = sessionData?.audioBlob;
    if (!blob) return;
    const ext = blob.type.includes('ogg') ? 'ogg' : blob.type.includes('mp4') ? 'mp4' : 'webm';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `interview-recording-${date}.${ext}`; a.click();
    URL.revokeObjectURL(url);
  }

  function triggerDownload(content, type, filename) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div className="min-h-screen bg-[#080c14] flex flex-col">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 bg-[#0b1120] border-b border-[#0f172a] sticky top-0 z-10 flex-wrap gap-2">
        <div>
          <div className="flex items-center gap-1.5">
            <span className="text-xs font-bold text-blue-400 tracking-wider">ZAQNOVA</span>
            <span className="text-xs text-slate-600">Session Notes</span>
          </div>
          <p className="text-xs text-slate-500 mt-0.5">{cfg.jobTitle} · {formatTime(sessionData?.duration || 0)}</p>
        </div>
        <div className="flex items-center gap-1.5 flex-wrap">
          <button
            onClick={copyNotes}
            disabled={!notes || generating}
            className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-[#1e293b] text-slate-400 hover:border-slate-600 hover:text-white transition-colors disabled:opacity-30"
          >
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" />
            </svg>
            {copied ? 'Copied!' : 'Copy Notes'}
          </button>
          <button
            onClick={downloadNotes}
            disabled={!notes || generating}
            className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-[#1e293b] text-slate-400 hover:border-slate-600 hover:text-white transition-colors disabled:opacity-30"
          >
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            Notes .txt
          </button>
          {(sessionData?.transcript?.length > 0) && (
            <button
              onClick={downloadTranscript}
              className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-[#1e293b] text-slate-400 hover:border-slate-600 hover:text-white transition-colors"
            >
              <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
              </svg>
              Transcript .txt
            </button>
          )}
          {sessionData?.audioBlob && (
            <button
              onClick={downloadRecording}
              className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-amber-500/40 text-amber-400 bg-amber-500/10 hover:bg-amber-500/20 transition-colors"
            >
              <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
              </svg>
              Recording .webm
            </button>
          )}
          <button
            onClick={onRestart}
            className="px-3 py-1.5 text-xs font-semibold rounded-lg bg-blue-600 hover:bg-blue-500 text-white transition-colors"
          >
            New Session
          </button>
        </div>
      </div>

      <div className="flex-1 max-w-3xl mx-auto w-full p-4 md:p-6">
        {error && (
          <div className="mb-4 bg-amber-500/10 border border-amber-500/30 rounded-xl p-3 text-xs text-amber-400">{error}</div>
        )}

        {generating ? (
          <div className="flex flex-col items-center justify-center py-24 gap-4 text-slate-500">
            <div className="w-8 h-8 border-2 border-slate-700 border-t-blue-500 rounded-full spinner" />
            <span className="text-sm">Generating session debrief…</span>
          </div>
        ) : (
          <div className="bg-[#0b1120] border border-[#0f172a] rounded-2xl p-5 md:p-6">
            <pre className="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap font-sans">{notes}</pre>
          </div>
        )}

        {/* Full Q&A log */}
        {!generating && sessionData?.entries?.filter(e => e.a && !e.a.startsWith('Error:')).length > 0 && (
          <div className="mt-6">
            <h3 className="text-xs font-semibold text-slate-600 uppercase tracking-wider mb-3">
              Full Q&amp;A Log ({sessionData.entries.filter(e => e.a && !e.a.startsWith('Error:')).length} answered)
            </h3>
            <div className="space-y-3">
              {sessionData.entries.filter(e => e.a && !e.a.startsWith('Error:')).map((e, i) => (
                <div key={e.id} className="bg-[#0b1120] border border-[#0f172a] rounded-xl p-4">
                  <p className="text-xs text-slate-600 font-semibold mb-1">Q{i+1}</p>
                  <p className="text-xs text-slate-400 mb-3 leading-relaxed">{e.q}</p>
                  <p className="text-xs text-blue-400/70 font-semibold mb-1">Answer</p>
                  <p className="text-sm text-slate-300 leading-relaxed">{e.a}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('setup');
  const [cfg, setCfg] = useState(null);
  const [sessionData, setSessionData] = useState(null);

  return screen === 'setup'
    ? <SetupScreen onStart={c => { setCfg(c); setScreen('session'); }} />
    : screen === 'session'
    ? <SessionScreen cfg={cfg} onEnd={d => { setSessionData(d); setScreen('notes'); }} />
    : <NotesScreen cfg={cfg} sessionData={sessionData} onRestart={() => { setSessionData(null); setScreen('setup'); }} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
