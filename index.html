const POPUP_SCRIPT = `
var entries=[];
window.addEventListener('message',function(e){
  // Only accept messages from our direct opener — reject foreign origins
  if(e.source!==window.opener) return;
  var d=e.data; if(!d||!d.t) return;
  if(d.t==='add'){entries.push(d.entry);render();}
  else if(d.t==='upd'){var i=entries.findIndex(function(x){return x.id===d.id});if(i>=0){entries[i]=Object.assign({},entries[i],d.patch);render();}}
  else if(d.t==='clr'){entries=[];render();}
  else if(d.t==='hide'){document.body.style.opacity='0';document.body.style.pointerEvents='none';}
  else if(d.t==='show'){document.body.style.opacity='1';document.body.style.pointerEvents='';}
});
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\'/g,'&#39;');}
function render(){
  var r=document.getElementById('root');
  if(!entries.length){r.innerHTML='<div class="empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Waiting for questions…</span><span style="font-size:11px;color:#1e293b">Auto-detect is active</span></div>';return;}

// ═══════════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════════
let _id = 0;
const uid = () => `${Date.now()}-${++_id}`;

function useLocalStorage(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try { const s = localStorage.getItem(key); return s !== null ? JSON.parse(s) : defaultValue; }
    catch { return defaultValue; }
  });
  const set = (newVal) => {
    const v = typeof newVal === 'function' ? newVal(value) : newVal;
    setValue(v);
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  };
  return [value, set];
}

function formatTime(secs) {
  const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function triggerDownload(content, mime, filename) {
  const url = URL.createObjectURL(new Blob([content], { type: mime }));
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function extractPdfText(file) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  let text = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 12); i++) {
    const content = await (await pdf.getPage(i)).getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  return text.trim();
}

async function extractDocxText(file) {
  const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
  return result.value.trim();
}

async function extractFileText(file) {
  const n = file.name.toLowerCase();
  if (file.type === 'application/pdf' || n.endsWith('.pdf')) return extractPdfText(file);
  if (n.endsWith('.docx') || file.type.includes('wordprocessingml')) return extractDocxText(file);
  if (n.endsWith('.doc')) throw new Error('.doc not supported — save as .docx or .pdf');
  return file.text();
}

const QUESTION_STARTERS = ['what','how','why','when','where','who','which','whose','whom','can you','could you','would you','will you','do you','did you','have you','are you','tell me','describe','explain','walk me through','share','give me','talk about','let\'s say','imagine','suppose','if you','what if','in your','why did','why do','how did','how do','have you ever','what was','what were','what is','what are','what would','how would','how have','where do','where did','why would','who was','who is','what experience','tell us','give us','can you walk','can you share','can you give','can you describe'];

function isQuestion(text) {
  if (!text || text.trim().length < 8) return false;
  const t = text.trim();
  if (t.endsWith('?')) return true;
  const l = t.toLowerCase();
  return QUESTION_STARTERS.some(s => l.startsWith(s));
}

// ═══════════════════════════════════════════════════════════════════════════════
// HISTORY STORAGE
// ═══════════════════════════════════════════════════════════════════════════════
function loadHistory() {
  try {
    const raw = localStorage.getItem(LS_HISTORY);
    if (!raw) return [];
    const now = Date.now();
    return JSON.parse(raw).filter(s => now - s.savedAt < HISTORY_TTL_MS);
  } catch { return []; }
}

function saveToHistory(sessionData, cfg) {
  try {
    const history = loadHistory();
    history.push({
      id: uid(), savedAt: Date.now(), jobTitle: cfg.jobTitle || 'Untitled', model: cfg.model,
      duration: sessionData.duration || 0,
      transcriptLines: (sessionData.transcript || []).map(t => ({ type: t.type, text: t.text })),
      qaEntries: (sessionData.entries || []).filter(e => e.a && !e.a.startsWith('Error:')).map(e => ({ q: e.q, a: e.a })),
    });
    localStorage.setItem(LS_HISTORY, JSON.stringify(history));
  } catch (e) { console.warn('History save failed:', e); }
}

function deleteHistoryItem(id) {
  try { localStorage.setItem(LS_HISTORY, JSON.stringify(loadHistory().filter(s => s.id !== id))); } catch {}
}

// ═══════════════════════════════════════════════════════════════════════════════
// AI
// ═══════════════════════════════════════════════════════════════════════════════
async function callAnthropic(apiKey, model, messages, system, onChunk, signal) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', signal,
    headers: {
      'x-api-key': apiKey, 'anthropic-version': '2023-06-01',
      'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model, max_tokens: 600, stream: true, system, messages }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${res.status}`);
  }
  const reader = res.body.getReader(); const dec = new TextDecoder();
  let buf = '', full = '';
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n'); buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim(); if (data === '[DONE]') continue;
      try {
        const p = JSON.parse(data);
        if (p.type === 'content_block_delta' && p.delta?.text) { full += p.delta.text; onChunk?.(full); }
      } catch {}
    }
  }
  return full;
}

async function callOpenAI(apiKey, model, messages, system, onChunk, signal) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST', signal,
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      // max_completion_tokens works for all chat models and is required by o-series reasoning models
      model, max_completion_tokens: 600, stream: true,
      messages: [
        ...(system ? [{ role: 'system', content: system }] : []),
        ...messages,
      ],
    }),
  });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `OpenAI error ${res.status}`); }
  const reader = res.body.getReader(); const dec = new TextDecoder();
  let buf = '', full = '';
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n'); buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim(); if (data === '[DONE]') continue;
      try { const p = JSON.parse(data); const d = p.choices?.[0]?.delta?.content; if (d) { full += d; onChunk?.(full); } } catch {}
    }
  }
  return full;
}

async function callGemini(apiKey, model, messages, system, onChunk, signal) {
  const contents = messages.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] }));
  const body = { contents, generationConfig: { maxOutputTokens: 600 } };
  if (system) body.systemInstruction = { parts: [{ text: system }] };
  // Key goes in a header, not the URL — query-string keys end up in server/proxy logs.
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse`,
    { method: 'POST', signal, headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey }, body: JSON.stringify(body) }
  );
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `Gemini error ${res.status}`); }
  const reader = res.body.getReader(); const dec = new TextDecoder();
  let buf = '', full = '';
  while (true) {
    const { done, value } = await reader.read(); if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n'); buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim(); if (!data) continue;
      try { const p = JSON.parse(data); const t = p.candidates?.[0]?.content?.parts?.[0]?.text; if (t) { full += t; onChunk?.(full); } } catch {}
    }
  }
  return full;
}

function callAI(cfg, messages, system, onChunk, signal) {
  const key = getActiveKey(cfg);
  const p = getProvider(cfg.model);
  if (p === 'openai') return callOpenAI(key, cfg.model, messages, system, onChunk, signal);
  if (p === 'gemini') return callGemini(key, cfg.model, messages, system, onChunk, signal);
  return callAnthropic(key, cfg.model, messages, system, onChunk, signal);
}

async function callAnthropicVision(apiKey, model, base64Image, prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey, 'anthropic-version': '2023-06-01',
      'content-type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model, max_tokens: 400,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64Image } },
          { type: 'text', text: prompt }
        ]
      }]
    }),
  });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `API error ${res.status}`); }
  const data = await res.json();
  return data.content?.[0]?.text?.trim() || '';
}

async function callOpenAIVision(apiKey, model, base64Image, prompt) {
  const vModel = model; // GPT-5.6 models all accept image input
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: vModel, max_completion_tokens: 400,
      messages: [{ role: 'user', content: [
        { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${base64Image}` } },
        { type: 'text', text: prompt }
      ]}]
    }),
  });
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `OpenAI vision error ${res.status}`); }
  const data = await res.json();
  return data.choices?.[0]?.message?.content?.trim() || '';
}

async function callGeminiVision(apiKey, model, base64Image, prompt) {
  const vModel = model; // Gemini 3.x models all accept image input
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${vModel}:generateContent`,
    { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
      body: JSON.stringify({ contents: [{ parts: [
        { inline_data: { mime_type: 'image/jpeg', data: base64Image } },
        { text: prompt }
      ]}]}) }
  );
  if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `Gemini vision error ${res.status}`); }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
}

function callAIVision(cfg, base64Image, prompt) {
  const key = getActiveKey(cfg);
  const p = getProvider(cfg.model);
  if (p === 'openai') return callOpenAIVision(key, cfg.model, base64Image, prompt);
  if (p === 'gemini') return callGeminiVision(key, cfg.model, base64Image, prompt);
  return callAnthropicVision(key, cfg.model, base64Image, prompt);
}

function buildSystemPrompt(cfg) {
  const parts = [
    'You are a personal interview coach helping a candidate answer questions live during a job interview. Be concise, confident, and direct. Sound completely natural — like a real person speaking.',
    'Keep answers to 3-5 sentences. Lead with the most impressive point.',
    `Job role: ${cfg.jobTitle || 'Not specified'}.`,
  ];
  const activeResumes = (cfg.resumeDocs || []).filter(d => d.active);
  if (activeResumes.length) parts.push('\nCandidate resume / background:\n' + activeResumes.map(d => `[${d.name}]\n${d.text.slice(0,3000)}`).join('\n\n'));
  const activeCtx = (cfg.contextDocs || []).filter(d => d.active);
  if (activeCtx.length) parts.push('\nContext documents:\n' + activeCtx.map(d => `[${d.name}]\n${d.text.slice(0,2000)}`).join('\n\n'));
  if (cfg.context) parts.push(`\nExtra instructions: ${cfg.context}`);
  parts.push('\nNever say you are an AI. Answer in first person as the candidate. Be specific and use examples where possible.');
  return parts.join('\n');
}

// DOCUMENT LIST COMPONENT
// ═══════════════════════════════════════════════════════════════════════════════
function DocumentList({ docs, onChange, label, maxDocs, hint }) {
  const inputRef = useRef();
  const [adding, setAdding] = useState(false);
  const [addErr, setAddErr] = useState('');

  async function handleFiles(e) {
    const files = Array.from(e.target.files); e.target.value = '';
    if (!files.length) return;
    setAdding(true); setAddErr('');
    const newDocs = [];
    for (const file of files) {
      if (docs.length + newDocs.length >= maxDocs) break;
      try {
        const text = await extractFileText(file);
        newDocs.push({ id: uid(), name: file.name, text: text.slice(0, MAX_DOC_CHARS), active: true, size: text.length, addedAt: Date.now() });
      } catch (err) { setAddErr(err.message); }
    }
    if (newDocs.length) onChange([...docs, ...newDocs]);
    setAdding(false);
  }

  const toggle = (id) => onChange(docs.map(d => d.id === id ? { ...d, active: !d.active } : d));
  const remove = (id) => onChange(docs.filter(d => d.id !== id));
  const canAdd = docs.length < maxDocs;
  const active = docs.filter(d => d.active).length;

  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2">
          <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">{label}</span>
          {active > 0 && <span className="text-xs text-blue-400/70 font-medium">{active} active</span>}
        </div>
        <button onClick={() => canAdd && !adding && inputRef.current.click()} disabled={!canAdd || adding}
          className="flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 disabled:opacity-30 disabled:cursor-not-allowed transition-colors font-semibold">
          {adding ? <div className="w-3 h-3 border border-slate-600 border-t-blue-400 rounded-full spinner" />
            : <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>}
          {adding ? 'Reading…' : 'Add'}
        </button>
      </div>
      <input ref={inputRef} type="file" accept=".pdf,.docx,.txt" multiple onChange={handleFiles} />
      <div className="space-y-1">
        {docs.length === 0 && (
          <button onClick={() => !adding && inputRef.current.click()}
            className="w-full py-3 text-xs text-slate-600 border border-dashed border-[#1e293b] rounded-lg hover:border-slate-600 hover:text-slate-500 transition-colors text-center">
            {hint || 'Click Add \xb7 .pdf .docx .txt'}
          </button>
        )}
        {docs.map(doc => (
          <div key={doc.id} className={`doc-row flex items-center gap-2 px-2.5 py-2 rounded-lg border transition-all ${doc.active ? 'border-blue-500/25 bg-blue-500/5' : 'border-[#1e293b]'}`}>
            <input type="checkbox" checked={doc.active} onChange={() => toggle(doc.id)} className="flex-shrink-0 w-3.5 h-3.5 cursor-pointer accent-blue-500" />
            <span className={`flex-1 text-xs truncate min-w-0 ${doc.active ? 'text-slate-300' : 'text-slate-600'}`} title={doc.name}>{doc.name}</span>
            <span className="text-xs text-slate-700 flex-shrink-0 font-mono tabular-nums">{doc.size > 999 ? `${(doc.size/1000).toFixed(1)}k` : doc.size}</span>
            <button onClick={() => remove(doc.id)} className="doc-remove text-slate-600 hover:text-red-400 transition-colors flex-shrink-0 w-4 text-center text-sm leading-none">&times;</button>
          </div>
        ))}
      </div>
      {addErr && <p className="text-xs text-red-400 mt-1.5">{addErr}</p>}
      <div className="flex items-center justify-between mt-1.5">
        <p className="text-xs text-slate-700">.pdf \xb7 .docx \xb7 .txt — select multiple</p>
        {docs.length >= maxDocs && <p className="text-xs text-slate-600">Max {maxDocs} docs</p>}
      </div>
    </div>
  );
}

function SessionScreen({ cfg, onEnd }) {
  const [entries, setEntries]           = useState([]);
  const [transcript, setTranscript]     = useState([]);
  const [interimText, setInterimText]   = useState('');   // live speech before final
  const [isListening, setIsListening]   = useState(false);
  const [isRecording, setIsRecording]   = useState(false);
  const [micError, setMicError]         = useState('');
  const [sessionTime, setSessionTime]   = useState(0);
  const [manualInput, setManualInput]   = useState('');
  const [popupOpen, setPopupOpen]       = useState(false);
  const [popupBlocked, setPopupBlocked] = useState(false);
  const [popupHidden, setPopupHidden]   = useState(false);
  const [statusMsg, setStatusMsg]       = useState('');
  const [autoAnswer, setAutoAnswer]     = useState(true);
  const [capturing, setCapturing]       = useState(false);
  const [endConfirm, setEndConfirm]     = useState(false);

  const popupRef       = useRef(null);
  const abortCtrlRef   = useRef(null);   // AbortController for in-flight AI fetches
  const recognitionRef  = useRef(null);
  const wantListenRef   = useRef(false);  // tracks intent so we can auto-restart on crash
  const recorderRef    = useRef(null);
  const audioStreamRef = useRef(null);
  const audioChunksRef = useRef([]);
  const timerRef       = useRef(null);
  const debounceRef    = useRef(null);
  const lastQRef       = useRef('');
  const txEndRef       = useRef(null);
  const entriesRef     = useRef([]);
  const transcriptRef  = useRef([]);
  const sessionTimeRef = useRef(0);

  useEffect(() => { entriesRef.current    = entries;    }, [entries]);
  useEffect(() => { transcriptRef.current = transcript; }, [transcript]);

  useEffect(() => {
    timerRef.current = setInterval(() => {
      setSessionTime(t => { sessionTimeRef.current = t + 1; return t + 1; });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, []);

  useEffect(() => { openPopup(); return () => { if (popupRef.current && !popupRef.current.closed) popupRef.current.close(); }; }, []);

  useEffect(() => {
    const h = (e) => { if (e.ctrlKey && e.shiftKey && (e.key === 'H' || e.key === 'h')) { e.preventDefault(); doTogglePopup(); } };
    window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
  }, [popupHidden]);

  useEffect(() => {
    if (window.electronAPI?.onAnswerVisibilityChanged) {
      // Returns an unsubscribe fn — clean up to prevent IPC listener accumulation
      const unsub = window.electronAPI.onAnswerVisibilityChanged(isHidden => setPopupHidden(isHidden));
      return () => { if (typeof unsub === 'function') unsub(); };
    }
  }, []);

  useEffect(() => {
    const ch = setInterval(() => {
      if (popupRef.current && popupRef.current.closed) { setPopupOpen(false); popupRef.current = null; }
    }, 1200);
    return () => clearInterval(ch);
  }, []);

  useEffect(() => { txEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [transcript, interimText]);

  function openPopup() {
    try {
      const sw = window.screen.width, sh = window.screen.height;
      const pw = 460, ph = Math.min(740, sh - 60);
      const popup = window.open('', 'ZaqNovaAnswers',
        `width=${pw},height=${ph},left=${Math.max(0,sw-pw-14)},top=${Math.floor((sh-ph)/2)},menubar=no,toolbar=no,location=no,status=no,scrollbars=yes,resizable=yes`);
      if (!popup || popup.closed) { setPopupBlocked(true); return; }
      popup.document.open(); popup.document.write(POPUP_HTML); popup.document.close();
      popupRef.current = popup; setPopupOpen(true); setPopupBlocked(false); setPopupHidden(false);
    } catch { setPopupBlocked(true); }
  }

  function postToPopup(msg) {
    if (popupRef.current && !popupRef.current.closed)
      try { popupRef.current.postMessage(msg, window.location.origin || '*'); } catch {}
  }

  function doTogglePopup() {
    if (!popupRef.current || popupRef.current.closed) { openPopup(); return; }
    if (popupHidden) { postToPopup({ t: 'show' }); setPopupHidden(false); }
    else             { postToPopup({ t: 'hide' }); setPopupHidden(true); }
  }

  function showStatus(msg, ms = 2500) { setStatusMsg(msg); setTimeout(() => setStatusMsg(''), ms); }

  // ── Recording ──────────────────────────────────────────────────────────────
  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioStreamRef.current = stream; audioChunksRef.current = [];
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
      const mr = new MediaRecorder(stream, { mimeType: mime });
      mr.ondataavailable = e => { if (e.data?.size > 0) audioChunksRef.current.push(e.data); };
      mr.start(1000); recorderRef.current = mr; setIsRecording(true);
    } catch (err) {
      // Surface mic-access errors rather than silently skipping recording
      setMicError(`Recording unavailable: ${err.message}`);
    }
  }

  function stopRecording() {
    return new Promise(resolve => {
      const mr = recorderRef.current; if (!mr) { resolve(null); return; }
      const chunks = audioChunksRef.current, mime = mr.mimeType || 'audio/webm';
      mr.addEventListener('stop', () => resolve(new Blob(chunks, { type: mime })), { once: true });
      try { mr.stop(); } catch { resolve(null); }
      recorderRef.current = null;
      if (audioStreamRef.current) { audioStreamRef.current.getTracks().forEach(t => t.stop()); audioStreamRef.current = null; }
      setIsRecording(false);
    });
  }

  // ── AI Answer ──────────────────────────────────────────────────────────────
  async function processQuestion(question) {
    if (!question.trim() || question.trim() === lastQRef.current) return;
    lastQRef.current = question.trim();
    const id = uid();
    const entry = { id, q: question.trim(), a: '', loading: true, streaming: false };
    setEntries(prev => [...prev, entry]);
    postToPopup({ t: 'add', entry: { ...entry } });
    // Create a fresh AbortController for this request
    const ctrl = new AbortController();
    abortCtrlRef.current = ctrl;
    try {
      let started = false;
      const final = await callAI(cfg,
        [{ role: 'user', content: question }], buildSystemPrompt(cfg),
        (partial) => {
          if (!started) {
            started = true;
            setEntries(prev => prev.map(e => e.id === id ? { ...e, loading: false, streaming: true, a: partial } : e));
            postToPopup({ t: 'upd', id, patch: { loading: false, streaming: true, a: partial } });
          } else {
            setEntries(prev => prev.map(e => e.id === id ? { ...e, a: partial } : e));
            postToPopup({ t: 'upd', id, patch: { a: partial } });
          }
        },
        ctrl.signal
      );
      setEntries(prev => prev.map(e => e.id === id ? { ...e, loading: false, streaming: false, a: final } : e));
      postToPopup({ t: 'upd', id, patch: { loading: false, streaming: false, a: final } });
    } catch (err) {
      if (err.name === 'AbortError') return; // session ended — discard silently
      // OpenAI blocks direct browser calls (CORS) — a key can't work here.
      const isOpenAICors = getProvider(cfg.model) === 'openai' && /failed to fetch|networkerror|load failed/i.test(err.message || '');
      const msg = isOpenAICors
        ? 'Error: OpenAI\'s API blocks direct browser calls, so an OpenAI key can\'t be used for live answers. Switch to an Anthropic (Claude) or Google (Gemini) model on the setup screen — both work in the browser.'
        : `Error: ${err.message}`;
      setEntries(prev => prev.map(e => e.id === id ? { ...e, loading: false, streaming: false, a: msg } : e));
      postToPopup({ t: 'upd', id, patch: { loading: false, streaming: false, a: msg } });
      showStatus(isOpenAICors ? 'OpenAI can\'t run in-browser — use Claude or Gemini' : 'API error — check key & network');
    }
  }

  // ── Screen Capture + Vision ────────────────────────────────────────────────
  async function captureScreen() {
    if (capturing) return;
    setCapturing(true);
    showStatus('Select the window to capture…', 8000);
    let stream = null;
    try {
      stream = await navigator.mediaDevices.getDisplayMedia({ video: { displaySurface: 'window' }, audio: false });
      const video = document.createElement('video');
      video.srcObject = stream; video.muted = true;
      await new Promise(resolve => { video.onloadedmetadata = resolve; });
      await video.play();
      await new Promise(r => setTimeout(r, 120)); // let frame settle
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
      showStatus('Analyzing screenshot…', 6000);
      const result = await callAIVision(cfg, base64,
        'This is a screenshot from a live job interview (Zoom, Teams, Google Meet, or similar). ' +
        'Find the most recent interview question visible anywhere — in chat, captions, slides, text on screen. ' +
        'Return ONLY the question text, nothing else. If no clear interview question is visible, respond exactly: NO_QUESTION'
      );
      if (result && result !== 'NO_QUESTION' && result.length > 4) {
        const id = uid();
        setTranscript(prev => [...prev, { id, type: 'question', text: result, source: 'capture' }]);
        processQuestion(result);
        showStatus('📷 Question captured — answering!', 2500);
      } else {
        showStatus('No interview question found in screenshot', 3000);
      }
    } catch (err) {
      if (err.name === 'NotAllowedError' || err.name === 'AbortError') showStatus('Screen capture cancelled');
      else showStatus('Capture failed: ' + err.message, 3500);
    } finally {
      // Always release the capture stream — even if canvas/vision step throws
      stream?.getTracks().forEach(t => t.stop());
    }
    setCapturing(false);
  }

  // ── Speech ─────────────────────────────────────────────────────────────────
  function startListening() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setMicError('Speech recognition not supported — use Chrome or Edge.'); return; }
    const rec = new SR(); rec.continuous = true; rec.interimResults = true; rec.lang = 'en-US';
    let finalBuf = '';
    rec.onstart = () => { setIsListening(true); setMicError(''); };
    rec.onerror = ev => { if (ev.error === 'not-allowed') setMicError('Microphone denied.'); else if (ev.error !== 'no-speech') setMicError(`Mic: ${ev.error}`); };
    rec.onend   = () => {
      setIsListening(false); setInterimText('');
      if (recognitionRef.current === rec) recognitionRef.current = null;
      // Auto-restart if the engine crashed but we still want to be listening
      if (wantListenRef.current) {
        setTimeout(() => { if (wantListenRef.current) startListening(); }, 600);
      }
    };
    rec.onresult = event => {
      let newFinal = ''; let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) newFinal += event.results[i][0].transcript + ' ';
        else interim += event.results[i][0].transcript;
      }
      // Show live interim text
      setInterimText(interim);
      if (!newFinal) return;
      setInterimText('');
      finalBuf += newFinal;
      const trimmed = finalBuf.trim();
      setTranscript(prev => {
        const last = prev[prev.length - 1];
        if (last && last.type === 'speech') return [...prev.slice(0,-1), { ...last, text: trimmed }];
        return [...prev, { id: uid(), type: 'speech', text: trimmed }];
      });
      clearTimeout(debounceRef.current);
      if (autoAnswer && isQuestion(trimmed)) {
        debounceRef.current = setTimeout(() => {
          const q = finalBuf.trim(); finalBuf = '';
          setTranscript(prev => [...prev, { id: uid(), type: 'question', text: q }]);
          processQuestion(q);
        }, 900); // tight debounce for seamless feel
      } else {
        debounceRef.current = setTimeout(() => { finalBuf = ''; }, 5000);
      }
    };
    wantListenRef.current = true;
    rec.start(); recognitionRef.current = rec;
    startRecording();
  }

  function stopListening() {
    wantListenRef.current = false; // prevent auto-restart
    clearTimeout(debounceRef.current);
    if (recognitionRef.current) { try { recognitionRef.current.stop(); } catch {} recognitionRef.current = null; }
    setIsListening(false); setInterimText('');
  }

  function askManual() {
    const q = manualInput.trim(); if (!q) return;
    setManualInput('');
    setTranscript(prev => [...prev, { id: uid(), type: 'question', text: q }]);
    processQuestion(q);
  }

  function answerSegment(text) {
    if (!text.trim()) return;
    setTranscript(prev => [...prev, { id: uid(), type: 'question', text: text.trim() }]);
    lastQRef.current = ''; // allow re-answer
    processQuestion(text.trim());
  }

  function dlTranscript() {
    const lines = transcriptRef.current; if (!lines.length) { showStatus('No transcript yet'); return; }
    const date = new Date().toISOString().slice(0,10);
    triggerDownload(
      `ZaqNova Interview CoPilot — Live Transcript\n${cfg.jobTitle} \xb7 ${formatTime(sessionTimeRef.current)} \xb7 ${date}\n${'─'.repeat(50)}\n\n` +
      lines.map(t => `[${t.type==='question'?'QUESTION':'SPEECH  '}]  ${t.text}`).join('\n\n'),
      'text/plain', `transcript-${date}.txt`
    );
  }

  async function handleEnd() {
    stopListening();
    clearInterval(timerRef.current);
    // Abort any in-flight AI streaming fetch
    abortCtrlRef.current?.abort();
    const audioBlob = await stopRecording();
    if (popupRef.current && !popupRef.current.closed) popupRef.current.close();
    onEnd({ entries: entriesRef.current, transcript: transcriptRef.current, duration: sessionTimeRef.current, audioBlob });
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  return (
    <div className="h-screen bg-[#080c14] flex flex-col overflow-hidden">

      {/* ── TOP NAV BAR ── */}
      <div className="flex items-center justify-between px-3 py-2 bg-[#0b1120] border-b border-[#0f172a] flex-shrink-0 gap-2">
        <div className="flex items-center gap-2.5">
          <span className="text-xs font-bold text-blue-400 tracking-wider hidden sm:block">ZAQNOVA</span>
          <span className="text-slate-700 hidden sm:block">|</span>
          <span className="text-slate-500 text-xs font-mono tabular-nums font-semibold">{formatTime(sessionTime)}</span>
          <span className="text-xs text-slate-700 hidden md:block font-medium">{getModelMeta(cfg.model)?.label || cfg.model}</span>
          {isRecording && (
            <div className="flex items-center gap-1 px-1.5 py-0.5 rounded border border-amber-500/30 bg-amber-500/10 pulse-ring-amber">
              <div className="w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0" />
              <span className="text-xs text-amber-400 font-semibold">REC</span>
            </div>
          )}
        </div>
        <div className="flex items-center gap-1.5">
          {statusMsg && <span className="text-xs text-slate-400 bg-[#0f172a] px-2 py-1 rounded border border-[#1e293b] max-w-xs truncate">{statusMsg}</span>}
          <button onClick={dlTranscript} title="Download transcript"
            className="p-1.5 rounded-lg text-slate-600 border border-[#1e293b] hover:text-slate-300 hover:border-slate-600 transition-colors">
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
          </button>
          <button onClick={doTogglePopup}
            className={`flex items-center gap-1 px-2 py-1.5 rounded-lg text-xs font-medium border transition-colors ${popupOpen && !popupHidden ? 'text-green-400 border-green-500/40 bg-green-500/10' : 'text-slate-500 border-[#1e293b] hover:border-slate-600'}`}>
            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 21 12 3l9.75 18H2.25Z"/></svg>
            {popupOpen && !popupHidden ? 'Live' : 'Popup'}
          </button>
        </div>
      </div>

      {/* ── CONTROL BAR ── */}
      <div className="flex items-center gap-2 px-3 py-2.5 bg-[#080c14] border-b border-[#0f172a] flex-shrink-0 flex-wrap">
        {/* Mic */}
        <button onClick={() => isListening ? stopListening() : startListening()}
          className={`flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold transition-all flex-shrink-0 ${isListening ? 'bg-red-500/20 text-red-400 border border-red-500/50 pulse-ring' : 'bg-[#0b1120] text-slate-300 border border-[#1e293b] hover:border-blue-500/50 hover:text-blue-300'}`}>
          <div className={`w-2 h-2 rounded-full flex-shrink-0 ${isListening ? 'bg-red-400 live-dot' : 'bg-slate-600'}`} />
          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/></svg>
          {isListening ? 'Listening…' : 'Start Mic'}
        </button>

        {/* Screen Capture */}
        <button onClick={captureScreen} disabled={capturing}
          title="Capture screen to detect question"
          className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-semibold border transition-all flex-shrink-0 ${capturing ? 'text-blue-400 border-blue-500/40 bg-blue-500/10 pulse-ring-blue' : 'text-slate-400 border-[#1e293b] bg-[#0b1120] hover:text-blue-300 hover:border-blue-500/40'}`}>
          {capturing
            ? <div className="w-3.5 h-3.5 border border-slate-600 border-t-blue-400 rounded-full spinner" />
            : <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z"/></svg>
          }
          {capturing ? 'Analyzing…' : 'Capture Screen'}
        </button>

        {/* Auto-answer toggle */}
        <div className="flex items-center gap-2 px-3 py-2 rounded-xl bg-[#0b1120] border border-[#1e293b]">
          <span className="text-xs text-slate-500 font-medium">Auto-answer</span>
          <button onClick={() => setAutoAnswer(v => !v)}
            className={`relative w-8 h-4 rounded-full transition-colors flex-shrink-0 ${autoAnswer ? 'bg-blue-600' : 'bg-slate-700'}`}>
            <div className={`toggle-knob absolute top-0.5 w-3 h-3 rounded-full bg-white ${autoAnswer ? 'translate-x-4' : 'translate-x-0.5'}`} />
          </button>
          {autoAnswer && <span className="text-xs text-blue-400/70 font-medium">ON</span>}
        </div>

        <div className="flex-1" />

        {/* End Session */}
        {!endConfirm ? (
          <button onClick={() => setEndConfirm(true)}
            className="flex items-center gap-1.5 px-4 py-2 rounded-xl text-xs font-bold text-slate-400 border border-[#1e293b] bg-[#0b1120] hover:text-red-400 hover:border-red-500/50 hover:bg-red-500/5 transition-all flex-shrink-0">
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M5.636 5.636a9 9 0 1 0 12.728 0M12 3v9"/></svg>
            End Session
          </button>
        ) : (
          <div className="flex items-center gap-1.5 flex-shrink-0">
            <span className="text-xs text-slate-500">End session?</span>
            <button onClick={handleEnd}
              className="px-3 py-2 rounded-xl text-xs font-bold text-white bg-red-600 hover:bg-red-500 transition-colors">
              Yes, End
            </button>
            <button onClick={() => setEndConfirm(false)}
              className="px-3 py-2 rounded-xl text-xs font-medium text-slate-500 border border-[#1e293b] hover:text-slate-300 transition-colors">
              Cancel
            </button>
          </div>
        )}
      </div>

      {/* ── ALERTS ── */}
      {popupBlocked && (
        <div className="mx-3 mt-2 flex items-start gap-2 bg-amber-500/10 border border-amber-500/30 rounded-xl p-2.5 flex-shrink-0">
          <svg className="w-3.5 h-3.5 text-amber-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126Z"/></svg>
          <p className="text-xs text-amber-400">Popup blocked — allow popups then <button onClick={openPopup} className="underline">try again</button>. Answers show in the panel below.</p>
        </div>
      )}
      {micError && <div className="mx-3 mt-2 bg-red-500/10 border border-red-500/30 rounded-xl p-2 text-xs text-red-400 flex-shrink-0">{micError}</div>}

      {/* ── MAIN PANELS ── */}
      <div className="flex-1 flex flex-col md:flex-row overflow-hidden min-h-0">

        {/* LEFT: LIVE TRANSCRIPT */}
        <div className="flex-1 flex flex-col overflow-hidden md:border-r border-[#0f172a] min-h-0">
          {/* Panel header */}
          <div className="px-3 py-2 border-b border-[#0f172a] flex items-center gap-2 flex-shrink-0">
            <span className="text-xs text-slate-600 font-semibold uppercase tracking-wider">Live Transcript</span>
            {isListening && (
              <div className="flex items-center gap-1">
                <div className="w-1.5 h-1.5 rounded-full bg-red-400 live-dot" />
                <span className="text-xs text-red-400/70 font-medium">LIVE</span>
              </div>
            )}
            {transcript.length > 0 && <span className="ml-auto text-xs text-slate-700">{transcript.length} line{transcript.length !== 1 ? 's' : ''}</span>}
          </div>

          {/* Transcript scroll area */}
          <div className="flex-1 overflow-y-auto p-3 space-y-1 min-h-0">
            {transcript.length === 0 && !interimText && (
              <div className="flex flex-col items-center justify-center h-40 text-slate-700 gap-2">
                <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1}><path strokeLinecap="round" strokeLinejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/></svg>
                <span className="text-xs">Press <span className="text-slate-600 font-semibold">Start Mic</span> to capture speech live</span>
                <span className="text-xs text-slate-700">or use <span className="text-slate-600 font-semibold">Capture Screen</span> to detect questions visually</span>
              </div>
            )}

            {transcript.map(t => (
              <div key={t.id} className={`tx-row fade-up flex items-start gap-2 py-1 px-1.5 rounded-lg group transition-colors hover:bg-[#0b1120]`}>
                <div className={`flex-shrink-0 w-2 h-2 rounded-full mt-1.5 ${t.type === 'question' ? 'bg-blue-500' : t.source === 'capture' ? 'bg-purple-500' : 'bg-slate-700'}`} />
                <div className="flex-1 min-w-0">
                  <p className={`text-xs leading-relaxed break-words ${t.type === 'question' ? 'text-slate-100 font-medium' : 'text-slate-500'}`}>
                    {t.text}
                    {t.type === 'question' && (
                      <span className={`ml-1.5 text-xs px-1.5 py-0.5 rounded font-semibold ${t.source === 'capture' ? 'text-purple-400 bg-purple-400/10' : 'text-blue-400 bg-blue-400/10'}`}>
                        {t.source === 'capture' ? '📷 captured' : 'Q→AI'}
                      </span>
                    )}
                  </p>
                </div>
                {/* Per-segment Answer button (hover reveal) */}
                <button
                  onClick={() => { lastQRef.current = ''; answerSegment(t.text); }}
                  title="Answer this"
                  className="tx-answer-btn flex-shrink-0 flex items-center gap-1 px-2 py-0.5 text-xs text-blue-400 bg-blue-500/10 border border-blue-500/30 rounded-md hover:bg-blue-500/20 transition-colors font-semibold">
                  <svg className="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/></svg>
                  Answer
                </button>
              </div>
            ))}

            {/* Live interim speech */}
            {interimText && (
              <div className="flex items-start gap-2 py-1 px-1.5">
                <div className="flex-shrink-0 w-2 h-2 rounded-full mt-1.5 bg-slate-600 live-dot" />
                <p className="text-xs text-slate-600 italic leading-relaxed">{interimText}<span className="inline-block w-0.5 h-3 bg-slate-600 ml-0.5 align-middle live-dot" /></p>
              </div>
            )}

            <div ref={txEndRef} />
          </div>

          {/* Manual input row */}
          <div className="p-2.5 border-t border-[#0f172a] flex gap-2 flex-shrink-0">
            <input type="text" value={manualInput} onChange={e => setManualInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askManual(); } }}
              placeholder="Type a question and press Answer…"
              className="flex-1 bg-[#0b1120] border border-[#1e293b] rounded-lg px-3 py-2 text-xs text-white placeholder-slate-600 focus:outline-none focus:border-blue-500/50 transition-colors" />
            <button onClick={askManual} disabled={!manualInput.trim()}
              className="flex items-center gap-1.5 px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-30 text-white rounded-lg text-xs font-bold transition-colors">
              <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/></svg>
              Answer
            </button>
          </div>
        </div>

        {/* RIGHT: AI ANSWERS (inline / fallback) */}
        <div className="flex-1 flex flex-col overflow-hidden md:max-w-sm lg:max-w-md min-h-0">
          <div className="px-3 py-2 border-b border-[#0f172a] flex items-center justify-between flex-shrink-0">
            <span className="text-xs text-slate-600 font-semibold uppercase tracking-wider">AI Answers</span>
            {popupOpen && !popupHidden
              ? <span className="text-xs text-green-400/60">→ Also in popup</span>
              : <span className="text-xs text-slate-700">Popup closed</span>}
          </div>
          <div className="flex-1 overflow-y-auto p-3 space-y-3 min-h-0">
            {entries.length === 0 && (
              <div className="flex flex-col items-center justify-center h-40 text-slate-700 gap-2">
                <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1}><path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/></svg>
                <span className="text-xs">AI answers will appear here</span>
              </div>
            )}
            {entries.map(entry => (
              <div key={entry.id} className="fade-up bg-[#0b1120] border border-[#0f172a] rounded-xl p-3">
                <p className="text-xs text-slate-600 font-semibold uppercase tracking-wider mb-1">Question</p>
                <p className="text-xs text-slate-500 mb-2.5 leading-relaxed">{entry.q}</p>
                <p className="text-xs text-blue-400 font-semibold uppercase tracking-wider mb-1">Answer</p>
                {entry.loading
                  ? <div className="flex items-center gap-2 text-slate-600 text-xs py-1"><div className="w-3 h-3 border border-slate-700 border-t-blue-500 rounded-full spinner" />Generating…</div>
                  : <>
                      <p className={`text-xs text-slate-200 leading-relaxed whitespace-pre-wrap ${entry.streaming ? 'blink' : ''}`}>{entry.a}</p>
                      {!entry.streaming && entry.a && !entry.a.startsWith('Error:') && (
                        <button onClick={() => { navigator.clipboard.writeText(entry.a); showStatus('Copied!'); }}
                          className="mt-2 text-xs text-slate-600 border border-[#1e293b] px-2 py-0.5 rounded hover:text-white hover:border-slate-500 transition-colors">Copy</button>
                      )}
                    </>
                }
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// NOTES SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
function NotesScreen({ cfg, sessionData, onRestart, onHistory }) {
  const [notes, setNotes]    = useState('');
  const [generating, setGen] = useState(false);
  const [copied, setCopied]  = useState(false);
  const [error, setError]    = useState('');
  const date = new Date().toISOString().slice(0,10);

  useEffect(() => { generateNotes(); }, []);

  async function generateNotes() {
    if (!sessionData?.entries?.length) { setNotes('No questions were recorded in this session.'); return; }
    setGen(true);
    try {
      const qaPairs = sessionData.entries.filter(e => e.a && !e.a.startsWith('Error:')).map((e,i) => `Q${i+1}: ${e.q}\nA${i+1}: ${e.a}`).join('\n\n');
      const text = await callAI(cfg,
        [{ role:'user', content:`Interview for "${cfg.jobTitle}" (${formatTime(sessionData.duration||0)}):\n\n${qaPairs}\n\nGenerate a structured post-session debrief:\n1. Session Overview\n2. Key Questions & Best Answers (top 3–5)\n3. Topics Covered\n4. Action Items\n5. Strengths Demonstrated\n6. Areas to Improve\n\nBe specific and actionable.` }],
        'You are an expert interview coach writing a post-session debrief. Be honest, specific, actionable.', null);
      setNotes(text);
    } catch (err) {
      setError(`Notes generation failed: ${err.message}`);
      setNotes(sessionData.entries.filter(e => e.a).map((e,i) => `Q${i+1}: ${e.q}\n\nA: ${e.a}`).join('\n\n―――――\n\n') || 'No answers recorded.');
    }
    setGen(false);
  }

  function dlNotes() {
    const t = `ZaqNova Interview CoPilot — Session Notes\n${cfg.jobTitle} \xb7 ${formatTime(sessionData?.duration||0)} \xb7 ${date}\n${'═'.repeat(55)}\n\n${notes}`;
    triggerDownload(t, 'text/plain', `notes-${date}.txt`);
  }
  function dlTranscript() {
    const lines = sessionData?.transcript || []; if (!lines.length) return;
    triggerDownload(
      `ZaqNova Interview CoPilot — Transcript\n${cfg.jobTitle} \xb7 ${formatTime(sessionData?.duration||0)} \xb7 ${date}\n${'─'.repeat(50)}\n\n` +
      lines.map(l => `[${l.type==='question'?'QUESTION':'SPEECH  '}]  ${l.text}`).join('\n\n'),
      'text/plain', `transcript-${date}.txt`);
  }
  function dlRecording() {
    const blob = sessionData?.audioBlob; if (!blob) return;
    const ext = blob.type.includes('ogg') ? 'ogg' : blob.type.includes('mp4') ? 'mp4' : 'webm';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `recording-${date}.${ext}`; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  return (
    <div className="min-h-screen bg-[#080c14] flex flex-col">
      <div className="flex items-center justify-between px-4 py-3 bg-[#0b1120] border-b border-[#0f172a] sticky top-0 z-10 flex-wrap gap-2">
        <div>
          <div className="flex items-center gap-1.5">
            <span className="text-xs font-bold text-blue-400 tracking-wider">ZAQNOVA</span>
            <span className="text-xs text-slate-600">Session Notes</span>
          </div>
          <p className="text-xs text-slate-500 mt-0.5">{cfg.jobTitle} \xb7 {formatTime(sessionData?.duration||0)} \xb7 Saved to history ✓</p>
        </div>
        <div className="flex items-center gap-1.5 flex-wrap">
          <button onClick={() => { navigator.clipboard.writeText(notes).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); }} disabled={!notes||generating}
            className="px-3 py-1.5 text-xs font-medium rounded-lg border border-[#1e293b] text-slate-400 hover:border-slate-600 hover:text-white transition-colors disabled:opacity-30">
            {copied ? '✓ Copied' : 'Copy Notes'}
          </button>
          <button onClick={dlNotes} disabled={!notes||generating} className="px-3 py-1.5 text-xs font-medium rounded-lg border border-[#1e293b] text-slate-400 hover:border-slate-600 hover:text-white transition-colors disabled:opacity-30">Notes .txt</button>
          {(sessionData?.transcript?.length > 0) && <button onClick={dlTranscript} className="px-3 py-1.5 text-xs font-medium rounded-lg border border-[#1e293b] text-slate-400 hover:border-slate-600 hover:text-white transition-colors">Transcript .txt</button>}
          {sessionData?.audioBlob && <button onClick={dlRecording} className="px-3 py-1.5 text-xs font-medium rounded-lg border border-amber-500/40 text-amber-400 bg-amber-500/10 hover:bg-amber-500/20 transition-colors">Recording .webm</button>}
          <button onClick={onHistory} className="px-3 py-1.5 text-xs font-medium rounded-lg border border-[#1e293b] text-slate-400 hover:border-slate-600 hover:text-white transition-colors">History</button>
          <button onClick={onRestart} className="px-3 py-1.5 text-xs font-semibold rounded-lg bg-blue-600 hover:bg-blue-500 text-white transition-colors">New Session</button>
        </div>
      </div>
      <div className="flex-1 max-w-3xl mx-auto w-full p-4 md:p-6">
        {error && <div className="mb-4 bg-amber-500/10 border border-amber-500/30 rounded-xl p-3 text-xs text-amber-400">{error}</div>}
        {generating
          ? <div className="flex flex-col items-center justify-center py-24 gap-4 text-slate-500"><div className="w-8 h-8 border-2 border-slate-700 border-t-blue-500 rounded-full spinner" /><span className="text-sm">Generating debrief…</span></div>
          : <div className="bg-[#0b1120] border border-[#0f172a] rounded-2xl p-5 md:p-6"><pre className="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap font-sans">{notes}</pre></div>
        }
        {!generating && sessionData?.entries?.filter(e => e.a && !e.a.startsWith('Error:')).length > 0 && (
          <div className="mt-6">
            <h3 className="text-xs font-semibold text-slate-600 uppercase tracking-wider mb-3">Full Q&amp;A Log</h3>
            <div className="space-y-3">
              {sessionData.entries.filter(e => e.a && !e.a.startsWith('Error:')).map((e, i) => (
                <div key={e.id} className="bg-[#0b1120] border border-[#0f172a] rounded-xl p-4">
                  <p className="text-xs text-slate-600 font-semibold mb-1">Q{i+1}</p>
                  <p className="text-xs text-slate-400 mb-3 leading-relaxed">{e.q}</p>
                  <p className="text-xs text-blue-400/70 font-semibold mb-1">Answer</p>
                  <p className="text-sm text-slate-300 leading-relaxed">{e.a}</p>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// HISTORY SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
function HistoryScreen({ onBack }) {
  const [sessions, setSessions]                 = useState([]);
  const [expanded, setExpanded]                 = useState(null);
  const [showClearConfirm, setShowClearConfirm] = useState(false);

  useEffect(() => { setSessions(loadHistory().sort((a,b) => b.savedAt - a.savedAt)); }, []);

  function handleDelete(id) { deleteHistoryItem(id); setSessions(prev => prev.filter(s => s.id !== id)); }
  function handleClearAll() { try { localStorage.removeItem(LS_HISTORY); } catch {} setSessions([]); setShowClearConfirm(false); }

  function dlTranscript(s) {
    const date = new Date(s.savedAt).toISOString().slice(0,10);
    triggerDownload(
      `ZaqNova Interview CoPilot — Transcript\n${s.jobTitle} \xb7 ${formatTime(s.duration)} \xb7 ${date}\n${'─'.repeat(50)}\n\n` +
      (s.transcriptLines||[]).map(t => `[${t.type==='question'?'QUESTION':'SPEECH  '}]  ${t.text}`).join('\n\n'),
      'text/plain', `transcript-${date}.txt`);
  }
  function dlQA(s) {
    const date = new Date(s.savedAt).toISOString().slice(0,10);
    triggerDownload(
      `ZaqNova Interview CoPilot — Q&A Log\n${s.jobTitle} \xb7 ${formatTime(s.duration)} \xb7 ${date}\n${'═'.repeat(55)}\n\n` +
      (s.qaEntries||[]).map((e,i) => `Q${i+1}: ${e.q}\n\nA${i+1}: ${e.a}`).join('\n\n' + '─'.repeat(40) + '\n\n'),
      'text/plain', `qa-log-${date}.txt`);
  }
  function daysLeft(savedAt) { return Math.max(0, Math.ceil((HISTORY_TTL_MS - (Date.now() - savedAt)) / (24*60*60*1000))); }

  return (
    <div className="min-h-screen bg-[#080c14] flex flex-col">
      <div className="flex items-center justify-between px-4 py-3 bg-[#0b1120] border-b border-[#0f172a] sticky top-0 z-10">
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="flex items-center gap-1 text-xs text-slate-500 hover:text-white transition-colors">
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>Back
          </button>
          <div>
            <div className="flex items-center gap-1.5"><span className="text-xs font-bold text-blue-400 tracking-wider">ZAQNOVA</span><span className="text-xs text-slate-600">Session History</span></div>
            <p className="text-xs text-slate-600 mt-0.5">Auto-deleted after 30 days</p>
          </div>
        </div>
        {sessions.length > 0 && (
          <div className="flex items-center gap-2">
            <span className="text-xs text-slate-600">{sessions.length} session{sessions.length!==1?'s':''}</span>
            {!showClearConfirm
              ? <button onClick={() => setShowClearConfirm(true)} className="text-xs text-slate-600 hover:text-red-400 transition-colors px-2 py-1 border border-[#1e293b] rounded-lg">Clear all</button>
              : <div className="flex items-center gap-1.5">
                  <span className="text-xs text-slate-500">Sure?</span>
                  <button onClick={handleClearAll} className="text-xs text-red-400 border border-red-500/40 px-2 py-1 rounded-lg hover:bg-red-500/10">Yes, delete all</button>
                  <button onClick={() => setShowClearConfirm(false)} className="text-xs text-slate-500 border border-[#1e293b] px-2 py-1 rounded-lg">Cancel</button>
                </div>
            }
          </div>
        )}
      </div>
      <div className="flex-1 max-w-3xl mx-auto w-full p-4 md:p-6">
        {sessions.length === 0 ? (
          <div className="flex flex-col items-center justify-center py-24 gap-3 text-slate-700">
            <svg className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1}><path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
            <span className="text-sm">No saved sessions yet</span>
            <span className="text-xs text-slate-700 text-center max-w-xs">Sessions save automatically when you end. Kept for 30 days.</span>
            <button onClick={onBack} className="mt-2 text-xs text-blue-400 border border-blue-500/30 px-3 py-1.5 rounded-lg hover:bg-blue-500/10 transition-colors">← Back to Setup</button>
          </div>
        ) : (
          <div className="space-y-3">
            {sessions.map(s => {
              const dl = daysLeft(s.savedAt);
              const dateStr = new Date(s.savedAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
              return (
                <div key={s.id} className="bg-[#0b1120] border border-[#0f172a] rounded-xl overflow-hidden">
                  <div className="p-4 flex items-start justify-between gap-3">
                    <div className="min-w-0">
                      <p className="text-sm font-semibold text-white truncate">{s.jobTitle}</p>
                      <div className="flex items-center gap-2 mt-1 flex-wrap">
                        <span className="text-xs text-slate-500">{dateStr}</span>
                        <span className="text-xs text-slate-600">\xb7</span>
                        <span className="text-xs text-slate-500">{formatTime(s.duration)}</span>
                        <span className="text-xs text-slate-600">\xb7</span>
                        <span className="text-xs text-slate-500">{s.qaEntries?.length||0} Q&amp;As</span>
                        <span className={`text-xs px-1.5 py-0.5 rounded font-medium ${dl<=3?'text-red-400 bg-red-500/10':dl<=7?'text-amber-400 bg-amber-500/10':'text-slate-600 bg-[#0f172a]'}`}>{dl}d left</span>
                      </div>
                    </div>
                    <div className="flex items-center gap-1.5 flex-shrink-0 flex-wrap justify-end">
                      {(s.transcriptLines?.length > 0) && <button onClick={() => dlTranscript(s)} className="text-xs text-slate-500 border border-[#1e293b] px-2 py-1 rounded-lg hover:text-white hover:border-slate-600 transition-colors">Transcript</button>}
                      {(s.qaEntries?.length > 0) && <button onClick={() => dlQA(s)} className="text-xs text-slate-500 border border-[#1e293b] px-2 py-1 rounded-lg hover:text-white hover:border-slate-600 transition-colors">Q&amp;A</button>}
                      <button onClick={() => setExpanded(expanded===s.id?null:s.id)}
                        className={`text-xs px-2 py-1 rounded-lg border transition-colors ${expanded===s.id?'text-blue-400 border-blue-500/40 bg-blue-500/10':'text-slate-500 border-[#1e293b] hover:text-white hover:border-slate-600'}`}>
                        {expanded===s.id?'Hide':'View'}
                      </button>
                      <button onClick={() => handleDelete(s.id)} className="text-xs text-slate-600 border border-[#1e293b] px-2 py-1 rounded-lg hover:text-red-400 hover:border-red-500/40 transition-colors">Delete</button>
                    </div>
                  </div>
                  {expanded===s.id && (
                    <div className="border-t border-[#0f172a] p-4 space-y-3 bg-[#080c14]/50">
                      {(!s.qaEntries||s.qaEntries.length===0) ? <p className="text-xs text-slate-600 text-center py-4">No Q&amp;A entries.</p>
                        : s.qaEntries.map((e,i) => (
                          <div key={i} className="border border-[#0f172a] rounded-lg p-3">
                            <p className="text-xs text-slate-600 font-semibold mb-1">Q{i+1}</p>
                            <p className="text-xs text-slate-400 mb-2 leading-relaxed">{e.q}</p>
                            <p className="text-xs text-blue-400/70 font-semibold mb-1">Answer</p>
                            <p className="text-xs text-slate-300 leading-relaxed">{e.a}</p>
                          </div>
                        ))
                      }
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen]    = useState('setup');
  const [cfg, setCfg]          = useState(null);
  const [sessionData, setData] = useState(null);

  function handleEnd(data) {
    if (cfg) saveToHistory(data, cfg);
    setData(data); setScreen('notes');
  }

  if (screen==='setup')   return <SetupScreen onStart={c=>{setCfg(c);setScreen('session');}} onHistory={()=>setScreen('history')} />;
  if (screen==='session') return <SessionScreen cfg={cfg} onEnd={handleEnd} />;
  if (screen==='notes')   return <NotesScreen cfg={cfg} sessionData={sessionData} onRestart={()=>{setData(null);setScreen('setup');}} onHistory={()=>setScreen('history')} />;
  if (screen==='history') return <HistoryScreen onBack={()=>setScreen(sessionData?'notes':'setup')} />;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
