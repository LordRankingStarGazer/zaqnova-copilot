// BULK GENERATOR  (TR-015: async queue, progress, retry, ZIP, CSV)
// ════════════════════════════════════════════════════════════════════
function BulkView({ go }) {
  const { profiles, jobs, cfg, tailored, setTailored, setToast } = useApp();
  const active = profiles.filter(p=>p.status!=='archived');
  const [profileId, setProfileId] = useState(active[0]?.id || '');
  const [opts, setOpts] = useState(DEFAULT_OPTS);
  const [rows, setRows] = useState([]);     // {jobId, status, score, error, recordId, attempts}
  const [running, setRunning] = useState(false);
  const cancelRef = useRef(false);

  const profile = profiles.find(p=>p.id===profileId);

  const initRows = () => setRows(jobs.map(j => ({ jobId:j.id, status:'pending', score:null, error:null, recordId:null, attempts:0 })));
  useEffect(() => { initRows(); }, [jobs.length]);

  const processOne = async (row) => {
    const job = jobs.find(j=>j.id===row.jobId);
    const v = validateImportRow(job);
    if (v.errors.length) return { ...row, status:'invalid', error:v.errors.join('; ') };
    let attempt = row.attempts;
    while (attempt <= MAX_RETRIES) {
      try {
        const result = await runTailoringPipeline(cfg, profile, job, opts);
        const record = { id:uid(), profileId, jobId:row.jobId, opts, createdAt:now(), source:clone(profile.parsed),
          versions:[{ v:1, tailored:result.tailored, scoring:result.scoring, warnings:result.warnings, gaps:result.gaps, changes:result.changes, at:now(), note:'Bulk generation' }], current:1 };
        setTailored(t => [record, ...t]);
        return { ...row, status:'completed', score:result.scoring.score, recordId:record.id, attempts:attempt };
      } catch (e) {
        attempt++;
        if (attempt > MAX_RETRIES) return { ...row, status:'failed', error:e.message, attempts:attempt };
        await new Promise(r=>setTimeout(r, 600 * attempt)); // exponential-ish backoff
      }
    }
    return row;
  };

  const run = async () => {
    if (!profile) { setToast('Select a resume profile'); return; }
    if (jobs.length===0) { setToast('No jobs to process'); return; }
    setRunning(true); cancelRef.current = false;
    audit('bulk.start', { count: jobs.length });
    let queue = rows.map(r => r.status==='completed' ? r : { ...r, status:'queued', error:null });
    setRows(queue);
    // bounded concurrency worker pool
    let idx = 0;
    const work = async () => {
      while (idx < queue.length && !cancelRef.current) {
        const my = idx++;
        if (queue[my].status==='completed') continue;
        setRows(prev => prev.map((r,i)=> i===my ? { ...r, status:'processing' } : r));
        const res = await processOne(queue[my]);
        queue[my] = res;
        setRows(prev => prev.map((r,i)=> i===my ? res : r));
      }
    };
    await Promise.all(Array.from({ length: BULK_CONCURRENCY }, work));
    setRunning(false);
    setToast(cancelRef.current ? 'Bulk run cancelled' : 'Bulk run finished');
  };

  const retryRow = async (i) => {
    setRows(prev => prev.map((r,x)=>x===i?{...r,status:'retrying',error:null}:r));
    const res = await processOne({ ...rows[i], attempts:0, status:'retrying' });
    setRows(prev => prev.map((r,x)=>x===i?res:r));
  };

  const downloadZip = async () => {
    const done = rows.filter(r=>r.status==='completed' && r.recordId);
    if (!done.length) { setToast('No completed resumes'); return; }
    const zip = new JSZip();
    for (const r of done) {
      const rec = tailored.find(t=>t.id===r.recordId); if (!rec) continue;
      const job = jobs.find(j=>j.id===r.jobId);
      const data = rec.versions.find(v=>v.v===rec.current).tailored;
      zip.file(buildFilename(profile, job, 'docx'), await toDocxBlob(data));
    }
    triggerDownload(await zip.generateAsync({ type:'blob' }), 'ZaqNova_Apply_Tailored_Resumes.zip');
    audit('bulk.zip', { count: done.length });
  };

  const downloadCsv = () => {
    const header = ['job_title','company','resume_filename','match_score','status','error'];
    const lines = [header.join(',')];
    rows.forEach(r => {
      const job = jobs.find(j=>j.id===r.jobId) || {};
      const fn = r.status==='completed' ? buildFilename(profile, job, 'docx') : '';
      lines.push([job.job_title, job.company_name, fn, r.score??'', r.status, (r.error||'').replace(/"/g,"'")].map(c=>`"${(c??'').toString().replace(/"/g,'""')}"`).join(','));
    });
    triggerDownload(new Blob([lines.join('\n')], { type:'text/csv' }), 'ZaqNova_Apply_Run_Report.csv');
  };

  const done = rows.filter(r=>r.status==='completed').length;
  const failed = rows.filter(r=>r.status==='failed').length;
  const pct = rows.length ? Math.round((rows.filter(r=>['completed','failed','invalid'].includes(r.status)).length/rows.length)*100) : 0;
  const statusColor = { pending:'slate', queued:'slate', processing:'blue', retrying:'amber', completed:'green', failed:'red', invalid:'red' };

  if (active.length===0) return <Empty title="No active resume profiles" body="Upload a resume first." action={<Btn onClick={()=>go('profiles')}>Profiles</Btn>} />;

  return <div>
    <h2 className="text-lg font-bold text-slate-100 mb-1">Bulk Tailored Resume Generator</h2>
    <p className="text-sm text-slate-500 mb-4">Generate tailored resumes for many jobs at once. Runs asynchronously with per-row progress, retries and downloads.</p>

    <div className="grid lg:grid-cols-3 gap-4 mb-4">
      <div className="lg:col-span-1 space-y-4">
        <Card className="p-4">
          <Field label="Base resume" required><Select value={profileId} onChange={e=>setProfileId(e.target.value)}>{active.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</Select></Field>
          <p className="text-xs text-slate-500">Accepted resume formats: PDF, DOCX, TXT · max {MAX_UPLOAD_MB} MB (upload in Profiles)</p>
          <div className="mt-2"><Btn variant="outline" className="!text-xs" onClick={()=>go('jobs')}>＋ Add / import jobs</Btn></div>
        </Card>
        <TailorControls opts={opts} setOpts={setOpts} />
      </div>
      <div className="lg:col-span-2">
        <Card className="p-4">
          <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
            <div className="flex gap-2">
              {!running ? <Btn onClick={run} disabled={jobs.length===0}>▶ Run {jobs.length} job{jobs.length!==1?'s':''}</Btn>
                : <Btn variant="danger" onClick={()=>{ cancelRef.current=true; }}>■ Cancel</Btn>}
              <Btn variant="outline" onClick={downloadZip} disabled={done===0}>↓ ZIP ({done})</Btn>
              <Btn variant="outline" onClick={downloadCsv} disabled={rows.length===0}>↓ CSV report</Btn>
            </div>
            <span className="text-xs text-slate-500">{done} done · {failed} failed · {jobs.length} total ({rows.length}/{BULK_ROW_LIMIT} rows)</span>
          </div>
          <div className="w-full bg-slate-800 rounded-full h-2 mb-3"><div className="bg-blue-500 h-2 rounded-full transition-all" style={{ width:pct+'%' }} role="progressbar" aria-valuenow={pct} /></div>

          {jobs.length===0 ? <Empty icon="🎯" title="No jobs queued" body="Add jobs in Job Targets, then run the batch." action={<Btn onClick={()=>go('jobs')}>Add jobs</Btn>} />
          : <div className="space-y-1.5">
            {rows.map((r,i)=>{ const job=jobs.find(j=>j.id===r.jobId)||{}; return <div key={r.jobId} className="flex items-center justify-between gap-2 bg-slate-950/50 rounded-lg px-3 py-2">
              <div className="min-w-0 flex-1"><p className="text-sm text-slate-200 truncate">{job.job_title} <span className="text-slate-500">· {job.company_name}</span></p>{r.error && <p className="text-xs text-red-400 truncate">{r.error}</p>}</div>
              <div className="flex items-center gap-2 shrink-0">
                {r.score!=null && <span className="text-xs text-slate-400">score {r.score}</span>}
                <Badge color={statusColor[r.status]}>{r.status}{r.status==='processing'&&<span className="inline-block ml-1 spin" style={{width:8,height:8,border:'1.5px solid currentColor',borderTopColor:'transparent',borderRadius:'50%'}}/>}</Badge>
                {r.status==='completed' && <button className="text-xs text-blue-400 hover:underline" onClick={()=>go('workspace',r.recordId)}>open</button>}
                {(r.status==='failed') && <button className="text-xs text-amber-400 hover:underline" onClick={()=>retryRow(i)}>retry</button>}
              </div>
            </div>; })}
          </div>}
        </Card>
      </div>
    </div>
  </div>;
}

// ════════════════════════════════════════════════════════════════════
// DASHBOARD + DATA CONTROLS
// ════════════════════════════════════════════════════════════════════
function Dashboard({ go }) {
  const { profiles, jobs, tailored, keys } = useApp();
  const hasKey = Object.values(keys).some(Boolean);
  const stats = [
    ['Resume profiles', profiles.filter(p=>p.status!=='archived').length, 'profiles'],
    ['Job targets', jobs.length, 'jobs'],
    ['Tailored resumes', tailored.length, 'tailored'],
  ];
  return <div>
    <div className="mb-5"><h2 className="text-xl font-bold text-slate-100">Welcome to ZaqNova Apply</h2><p className="text-sm text-slate-500">Tailor factually-accurate, ATS-ready resumes for every job — one at a time or in bulk.</p></div>
    {!hasKey && <Card className="p-4 mb-4 border-blue-700/40 bg-blue-950/20"><p className="text-sm text-blue-200">⚙ Add an AI provider key in <button className="underline font-semibold" onClick={()=>go('settings')}>Settings</button> to start generating.</p></Card>}
    <div className="grid sm:grid-cols-3 gap-3 mb-5">{stats.map(([l,n,nav])=><button key={l} onClick={()=>go(nav)} className="text-left"><Card className="p-4 hover:border-slate-600 transition"><p className="text-3xl font-bold text-slate-100">{n}</p><p className="text-sm text-slate-500">{l}</p></Card></button>)}</div>
    <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-3">
      {[['📄','Upload resume','profiles'],['🎯','Add a job','jobs'],['✨','Tailor one','tailor'],['📚','Bulk generate','bulk']].map(([i,t,nav])=>
        <button key={t} onClick={()=>go(nav)}><Card className="p-4 hover:border-blue-600 transition text-center"><div className="text-2xl mb-1">{i}</div><p className="text-sm font-semibold text-slate-200">{t}</p></Card></button>)}
    </div>
  </div>;
}

function DataView() {
  const { setProfiles, setJobs, setTailored, setToast } = useApp();
  const [confirm, setConfirm] = useState(null);
  const wipe = (what) => {
    if (what==='all') { [LS.PROFILES,LS.JOBS,LS.TAILORED,LS.AUDIT].forEach(k=>localStorage.removeItem(k)); setProfiles([]); setJobs([]); setTailored([]); }
    else if (what==='tailored') { setTailored([]); }
    audit('data.delete', { what }); setToast('Deleted'); setConfirm(null);
  };
  return <div className="max-w-xl">
    <h2 className="text-lg font-bold text-slate-100 mb-1">Data & Privacy</h2>
    <p className="text-sm text-slate-500 mb-4">All your data lives in this browser's localStorage. Nothing is uploaded to any ZaqNova server. Resume text is sent only to the AI provider you choose, at generation time.</p>
    <Card className="p-4 space-y-3">
      <div className="flex items-center justify-between"><span className="text-sm text-slate-300">Delete all tailored resumes</span><Btn variant="ghost" onClick={()=>setConfirm('tailored')}>Delete</Btn></div>
      <div className="flex items-center justify-between"><span className="text-sm text-slate-300">Delete everything (profiles, jobs, tailored, audit)</span><Btn variant="danger" onClick={()=>setConfirm('all')}>Delete all</Btn></div>
    </Card>
    {confirm && <Confirm title="Delete data?" body="This permanently removes the selected data from this browser. This cannot be undone." onConfirm={()=>wipe(confirm)} onCancel={()=>setConfirm(null)} />}
  </div>;
}

// ════════════════════════════════════════════════════════════════════
// SHELL / NAVIGATION
// ════════════════════════════════════════════════════════════════════
const NAV = [
  ['dashboard','Dashboard','🏠'],['profiles','Resumes','📄'],['jobs','Jobs','🎯'],
  ['tailor','Tailor','✨'],['bulk','Bulk','📚'],['tailored','Results','📝'],
  ['settings','Settings','⚙'],['data','Privacy','🔒'],
];
function Shell() {
  const [route, setRoute] = useState({ view:'dashboard', id:null, extra:null });
  const go = (view, id=null, extra=null) => { setRoute({ view, id, extra }); window.scrollTo(0,0); };
  const v = route.view;
  return <div className="min-h-screen flex flex-col md:flex-row">
    {/* Sidebar (desktop) */}
    <nav className="hidden md:flex md:flex-col w-52 shrink-0 border-r border-slate-800 p-3 sticky top-0 h-screen">
      <div className="px-2 py-3 mb-2"><span className="text-blue-500 font-bold tracking-widest text-sm">ZAQNOVA</span><div className="text-slate-200 font-semibold">Apply</div></div>
      {NAV.map(([k,l,i])=><button key={k} onClick={()=>go(k)} className={`flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-left mb-0.5 ${v===k?'bg-blue-600/20 text-blue-300':'text-slate-400 hover:bg-slate-800'}`}><span>{i}</span>{l}</button>)}
    </nav>
    {/* Top bar (mobile) */}
    <header className="md:hidden flex items-center justify-between px-4 py-3 border-b border-slate-800 sticky top-0 bg-[#080c14] z-30">
      <div><span className="text-blue-500 font-bold tracking-widest text-xs">ZAQNOVA</span> <span className="text-slate-200 font-semibold">Apply</span></div>
    </header>

    <main className="flex-1 p-4 md:p-6 pb-24 md:pb-6 max-w-6xl w-full mx-auto">
      {v==='dashboard' && <Dashboard go={go} />}
      {v==='profiles' && <ProfilesView go={go} />}
      {v==='profile' && <ProfileEditor id={route.id} go={go} />}
      {v==='jobs' && <JobsView go={go} />}
      {v==='tailor' && <TailorView presetJobId={route.id} presetProfileId={route.extra} go={go} />}
      {v==='bulk' && <BulkView go={go} />}
      {v==='tailored' && <TailoredListView go={go} />}
      {v==='workspace' && <WorkspaceView id={route.id} go={go} />}
      {v==='settings' && <SettingsView />}
      {v==='data' && <DataView />}
    </main>

    {/* Bottom nav (mobile) */}
    <nav className="md:hidden fixed bottom-0 inset-x-0 bg-[#0b1220] border-t border-slate-800 flex justify-around z-30 no-print">
      {[['dashboard','🏠'],['profiles','📄'],['jobs','🎯'],['bulk','📚'],['tailored','📝'],['settings','⚙']].map(([k,i])=>
        <button key={k} onClick={()=>go(k)} className={`flex-1 py-2.5 text-lg ${v===k||(k==='profiles'&&v==='profile')||(k==='tailored'&&v==='workspace')?'text-blue-400':'text-slate-500'}`} aria-label={k}>{i}</button>)}
    </nav>
  </div>;
}

function ErrorGate({ children }) {
  const [err, setErr] = useState(null);
  useEffect(() => {
    const h = (e) => { console.warn('Unhandled:', e?.reason?.message || e.message); };
    window.addEventListener('unhandledrejection', h);
    return () => window.removeEventListener('unhandledrejection', h);
  }, []);
  return children;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorGate><AppProvider><Shell /></AppProvider></ErrorGate>
);
</script>
</body>
</html>
